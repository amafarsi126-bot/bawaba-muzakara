<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المساعد القانوني الذكي — بوابة المذاكرة</title>
<meta name="theme-color" content="#0d1117">
<style>
:root{
  --gold:#c9a84c;--gold2:#e8c96a;
  --dark:#0d1117;--dark2:#161b22;--dark3:#1c2333;
  --card:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;--blue:#58a6ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Tahoma','Arial',sans-serif;background:var(--dark);color:var(--text);height:100vh;direction:rtl;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{background:var(--dark3);border-bottom:2px solid var(--gold);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;justify-content:space-between;}
.topbar-left{display:flex;align-items:center;gap:12px;flex:1;}
.back-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:7px 14px;border-radius:10px;text-decoration:none;font-size:.86rem;font-weight:700;cursor:pointer;border:none;font-family:inherit;}
.back-btn:hover{background:rgba(201,168,76,.2);}
.topbar-title{color:var(--gold);font-size:.95rem;font-weight:700;}
.topbar-sub{font-size:.72rem;color:var(--muted);}
.mode-toggle{background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.3);color:var(--blue);padding:6px 12px;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:inherit;font-weight:700;transition:all .2s;}
.mode-toggle:hover{background:rgba(88,166,255,.2);}

/* MESSAGES */
.msgs-wrap{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;max-width:900px;width:100%;margin:0 auto;}
.msgs-wrap::-webkit-scrollbar{width:5px;}
.msgs-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.msg{display:flex;gap:10px;animation:msgIn .25s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}

.msg-ico{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.msg.bot .msg-ico{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.25);}
.msg.user .msg-ico{background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.2);}

.msg-bubble{max-width:75%;padding:12px 16px;border-radius:16px;font-size:.92rem;line-height:1.9;word-wrap:break-word;}
.msg.bot .msg-bubble{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px 16px 16px 16px;}
.msg.user .msg-bubble{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.25);color:#e8d48a;border-radius:16px 4px 16px 16px;}

/* TYPING */
.typing{display:flex;gap:5px;align-items:center;padding:4px 0;}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:dotB 1.2s ease-in-out infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes dotB{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* SUGGESTIONS */
.sugs{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;max-width:900px;width:100%;margin:0 auto;flex-shrink:0;}
.sug{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:var(--gold);padding:7px 14px;border-radius:20px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:inherit;border:none;}
.sug:hover{background:rgba(201,168,76,.18);}

/* INPUT */
.input-wrap{padding:14px 16px;border-top:1px solid var(--border);background:var(--dark2);flex-shrink:0;}
.input-row{display:flex;gap:10px;align-items:flex-end;max-width:900px;margin:0 auto;width:100%;}
.inp{flex:1;background:var(--dark3);border:1.5px solid var(--border);border-radius:14px;color:var(--text);padding:12px 16px;font-family:inherit;font-size:.92rem;height:46px;direction:rtl;transition:border-color .2s;}
.inp:focus{outline:none;border-color:var(--gold);}
.inp::placeholder{color:var(--muted);}
.send-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;width:46px;height:46px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.05);}
.send-btn:disabled{opacity:.4;cursor:default;transform:none;}

/* MODE INDICATOR */
.mode-info{padding:8px 16px;background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);border-radius:8px;font-size:.78rem;color:var(--blue);margin-bottom:10px;text-align:center;}

@media(max-width:600px){.msg-bubble{max-width:85%}.input-row{flex-direction:column}.send-btn{width:100%}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="goBack()">← الرئيسية</button>
    <div>
      <div class="topbar-title">⚖️ المساعد القانوني الذكي</div>
      <div class="topbar-sub" id="mode-label">وضع ذكي متقدم</div>
    </div>
  </div>
  <button class="mode-toggle" id="mode-btn" onclick="toggleMode()">📚 وضع محلي</button>
</div>

<div class="msgs-wrap" id="msgs">
  <div class="msg bot">
    <div class="msg-ico">⚖️</div>
    <div class="msg-bubble">مرحباً! أنا مساعدك القانوني الذكي المتخصص في القوانين العُمانية.<br>يمكنك أن تسألني أي سؤال وسأساعدك بطريقة ذكية وتفاعلية 🤖📚</div>
  </div>
</div>

<div class="mode-info" id="mode-info" style="display:none;margin:10px 16px 0;max-width:900px;margin-left:auto;margin-right:auto;">
  ℹ️ يعمل الآن في الوضع المحلي (بدون اتصال بـ API)
</div>

<div class="sugs" id="sugs">
  <button class="sug" onclick="askSug(this)">ما تعريف الجريمة؟</button>
  <button class="sug" onclick="askSug(this)">شروط تعيين رجل الشرطة</button>
  <button class="sug" onclick="askSug(this)">أركان الزواج</button>
  <button class="sug" onclick="askSug(this)">عقوبة الإرهاب</button>
  <button class="sug" onclick="askSug(this)">مدة الاستيداع</button>
  <button class="sug" onclick="askSug(this)">سن التقاعد الإلزامي</button>
  <button class="sug" onclick="askSug(this)">حضانة الأطفال</button>
  <button class="sug" onclick="askSug(this)">شروط التجنيس</button>
</div>

<div class="input-wrap">
  <div class="input-row">
    <input type="text" class="inp" id="inp" placeholder="اكتب سؤالك هنا..."
      onkeydown="if(event.key==='Enter'){event.preventDefault();send();}">
    <button class="send-btn" id="send-btn" onclick="send()">➤</button>
  </div>
</div>

<script src="qa-manager.js"></script>
<script>
var chatHistory = [];
var busy = false;
var useSmartMode = true; // استخدام الوضع الذكي بشكل افتراضي

// ── NAVIGATION ──
function goBack(){
  window.location.href = 'index.html';
}

// ── MODE TOGGLE ──
function toggleMode(){
  useSmartMode = !useSmartMode;
  updateModeUI();
}

function updateModeUI(){
  const btn = document.getElementById('mode-btn');
  const label = document.getElementById('mode-label');
  const info = document.getElementById('mode-info');
  
  if(useSmartMode){
    btn.textContent = '📚 وضع محلي';
    label.textContent = 'وضع ذكي متقدم';
    info.style.display = 'none';
  } else {
    btn.textContent = '🤖 وضع ذكي';
    label.textContent = 'وضع محلي (قاعدة بيانات محلية)';
    info.style.display = 'block';
  }
}

// ── SUGGESTIONS ──
function askSug(btn){
  document.getElementById('inp').value = btn.textContent;
  document.getElementById('sugs').style.display = 'none';
  send();
}

// ── SMART ANSWER SYSTEM ──
function getSmartAnswer(q){
  const lower = q.toLowerCase();
  
  // محاولة البحث عن إجابة من qaManager أولاً
  const answer = qaManager.findAnswer(lower);
  if(answer) return answer;
  
  // إذا لم توجد إجابة، أرجع رسالة ذكية
  return generateSmartResponse(q);
}

function generateSmartResponse(q){
  const responses = [
    'هذا سؤال مهم جداً! دعني أساعدك بشرح مفصل.',
    'سؤال ممتاز! سأشرح لك بطريقة سهلة وواضحة.',
    'أنا متخصص في هذا الموضوع، دعني أساعدك.',
    'هذا من أهم المواضيع في القانون العماني!',
  ];
  
  const randomResponse = responses[Math.floor(Math.random() * responses.length)];
  
  // محاولة استخراج الكلمات المفتاحية
  const keywords = extractKeywords(q);
  
  let answer = randomResponse + '\n\n';
  
  if(keywords.length > 0){
    answer += 'الموضوع: ' + keywords.join(' + ') + '\n\n';
  }
  
  answer += 'للحصول على إجابة أكثر دقة، يرجى:\n';
  answer += '• طرح السؤال بصيغة أكثر تحديداً\n';
  answer += '• البحث عن مادة قانونية محددة\n';
  answer += '• الاستفسار عن موضوع معين من المنهاج';
  
  return answer;
}

function extractKeywords(q){
  const keywords = [];
  const topics = ['شرطة', 'جريمة', 'زواج', 'طلاق', 'جنسية', 'إرهاب', 'محكمة', 'قانون', 'عقوبة', 'حضانة'];
  
  topics.forEach(topic => {
    if(q.includes(topic)){
      keywords.push(topic);
    }
  });
  
  return keywords;
}



// ── SEND MESSAGE ──
function send(){
  if(busy) return;
  var inp = document.getElementById('inp');
  var q = inp.value.trim();
  if(!q) return;
  inp.value = '';
  document.getElementById('sugs').style.display = 'none';
  document.getElementById('send-btn').disabled = true;
  busy = true;
  addMsg('user', q);
  chatHistory.push({role:'user', content:q});
  var tid = 'typing_'+Date.now();
  addTyping(tid);
  setTimeout(function(){
    removeTyping(tid);
    var ans = getSmartAnswer(q.toLowerCase());
    chatHistory.push({role:'assistant', content:ans});
    addMsg('bot', ans);
    busy = false;
    document.getElementById('send-btn').disabled = false;
    inp.focus();
  }, 800);
}

// ── ADD MESSAGE ──
function addMsg(role, text){
  var msgs = document.getElementById('msgs');
  var ico = role==='bot' ? '⚖️' : '👤';
  var d = document.createElement('div');
  d.className = 'msg '+role;
  d.innerHTML = '<div class="msg-ico">'+ico+'</div><div class="msg-bubble">'+text.replace(/\n/g,'<br>')+'</div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── TYPING INDICATOR ──
function addTyping(id){
  var msgs = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg bot'; d.id = id;
  d.innerHTML = '<div class="msg-ico">⚖️</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping(id){
  var el = document.getElementById(id);
  if(el) el.remove();
}

// Initialize
updateModeUI();
</script>
<script src="navigation.js"></script>
</body>
</html>
