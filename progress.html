<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقدمي ونتائجي</title>
<meta name="theme-color" content="#0d1117">
<style>
:root{--gold:#c9a84c;--gold-light:#e8c96a;--dark:#0d1117;--dark2:#161b22;--dark3:#1c2333;--card:#21262d;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--blue:#58a6ff;--orange:#e8892a;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Tahoma','Arial',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;direction:rtl;font-size:16px;}
.top-bar{background:var(--dark3);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.back-btn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 15px;border-radius:10px;text-decoration:none;font-family:'Segoe UI',sans-serif;font-size:.86rem;font-weight:700;transition:all .2s;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.top-title{font-size:1rem;font-weight:700;}
.body{padding:18px;max-width:760px;margin:0 auto;}

/* بطاقة الطالب */
.student-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;text-align:center;}
.student-num{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:4px;font-family:monospace;}
.student-sub{font-size:.8rem;color:var(--muted);}

/* إحصائيات سريعة */
.quick-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.qs{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.qs-num{font-size:1.9rem;font-weight:900;}
.qs-lbl{font-size:.72rem;color:var(--muted);margin-top:4px;}

/* بطاقات الاختبارات */
.section-title{font-size:.92rem;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.test-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.test-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.test-name{font-size:.95rem;font-weight:700;}
.test-count{font-size:.76rem;color:var(--muted);background:var(--dark3);padding:3px 10px;border-radius:20px;}

/* شريط التقدم */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.prog-label{font-size:.76rem;color:var(--muted);width:60px;text-align:left;flex-shrink:0;}
.prog-bar{flex:1;height:8px;background:var(--dark3);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width .8s ease;}
.prog-score{font-size:.82rem;font-weight:700;width:38px;text-align:center;flex-shrink:0;}

/* تاريخ الاختبارات */
.history-list{margin-top:10px;}
.h-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.h-item:last-child{border-bottom:none;}
.h-score{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:900;flex-shrink:0;}
.h-info{flex:1;}
.h-date{font-size:.8rem;font-weight:700;}
.h-meta{font-size:.72rem;color:var(--muted);}
.h-trend{font-size:1.1rem;flex-shrink:0;}

/* فارغ */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty .ei{font-size:2.5rem;margin-bottom:12px;}

.brand-foot{text-align:center;padding:20px;font-size:.65rem;color:rgba(201,168,76,.25);letter-spacing:3px;}
</style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="back-btn">← الرئيسية</a>
  <span class="top-title">📈 تقدمي ونتائجي</span>
</div>

<div class="body">
  <div id="content"></div>
</div>

<div class="brand-foot">BY: AMAL ALFARSI</div>

<script>
var TESTS = [
  { key:'shamil',  name:'الاختبار الشامل',    ico:'🎓', color:'#f85149' },
  { key:'tareef',  name:'اختبار التعريفات',   ico:'📖', color:'#f85149' },
  { key:'ta3beer', name:'اختبار التعبير',      ico:'✍️', color:'#c9a84c' },
  { key:'qadaa',   name:'القضاء العسكري',     ico:'⚖️', color:'#58a6ff' },
];

function getColor(score){
  if(score >= 85) return '#3fb950';
  if(score >= 70) return '#c9a84c';
  return '#f85149';
}

function getTrend(results){
  if(results.length < 2) return '➡️';
  var last = results[results.length-1].score;
  var prev = results[results.length-2].score;
  if(last > prev) return '📈';
  if(last < prev) return '📉';
  return '➡️';
}

function render(){
  var user = localStorage.getItem('pwa_user');
  var el   = document.getElementById('content');

  if(!user || user === '__admin__'){
    el.innerHTML = '<div class="empty"><div class="ei">🔒</div><p>سجّل الدخول أولاً لرؤية نتائجك</p></div>';
    return;
  }

  // جلب نتائج هذا الطالب
  var allResults = {};
  var totalTests = 0;
  var totalScore = 0;
  var bestScore  = 0;

  TESTS.forEach(function(t){
    var key = 'results_' + t.key + '_' + user;
    try{
      var data = JSON.parse(localStorage.getItem(key) || '[]');
      allResults[t.key] = data;
      totalTests += data.length;
      data.forEach(function(r){
        totalScore += r.score;
        if(r.score > bestScore) bestScore = r.score;
      });
    }catch(e){
      allResults[t.key] = [];
    }
  });

  var avgScore = totalTests > 0 ? Math.round(totalScore / totalTests) : 0;

  var html = '';

  // بطاقة الطالب
  html += '<div class="student-card">';
  html += '<div class="student-num">' + user + '</div>';
  html += '<div class="student-sub">سجلات الطالب</div>';
  html += '</div>';

  // إحصائيات سريعة
  html += '<div class="quick-stats">';
  html += '<div class="qs"><div class="qs-num" style="color:var(--gold)">' + totalTests + '</div><div class="qs-lbl">اختبار أجريته</div></div>';
  html += '<div class="qs"><div class="qs-num" style="color:var(--green)">' + (avgScore||'—') + (avgScore?'%':'') + '</div><div class="qs-lbl">متوسط الدرجات</div></div>';
  html += '<div class="qs"><div class="qs-num" style="color:var(--blue)">' + (bestScore||'—') + (bestScore?'%':'') + '</div><div class="qs-lbl">أفضل نتيجة</div></div>';
  html += '</div>';

  // بطاقة لكل اختبار
  var hasAny = false;
  TESTS.forEach(function(t){
    var results = allResults[t.key] || [];
    if(results.length === 0) return;
    hasAny = true;

    var latest = results[results.length-1].score;
    var trend  = getTrend(results);
    var avg    = Math.round(results.reduce(function(s,r){ return s+r.score; },0) / results.length);

    html += '<div class="test-card">';
    html += '<div class="test-header">';
    html += '<div class="test-name">' + t.ico + ' ' + t.name + '</div>';
    html += '<div class="test-count">' + results.length + ' ' + (results.length===1?'اختبار':'اختبارات') + '</div>';
    html += '</div>';

    // شريط آخر نتيجة
    html += '<div class="prog-row">';
    html += '<div class="prog-label">آخر نتيجة</div>';
    html += '<div class="prog-bar"><div class="prog-fill" style="width:'+latest+'%;background:'+getColor(latest)+'"></div></div>';
    html += '<div class="prog-score" style="color:'+getColor(latest)+'">'+latest+'%</div>';
    html += '</div>';

    // شريط المتوسط
    html += '<div class="prog-row">';
    html += '<div class="prog-label">المتوسط</div>';
    html += '<div class="prog-bar"><div class="prog-fill" style="width:'+avg+'%;background:var(--blue)"></div></div>';
    html += '<div class="prog-score" style="color:var(--blue)">'+avg+'%</div>';
    html += '</div>';

    // تاريخ الاختبارات (آخر 5)
    html += '<div class="history-list">';
    var recent = results.slice(-5).reverse();
    recent.forEach(function(r, idx){
      var c = getColor(r.score);
      var tr = idx === 0 ? trend : '';
      html += '<div class="h-item">';
      html += '<div class="h-score" style="background:'+c+'22;color:'+c+';border:2px solid '+c+'">'+r.score+'%</div>';
      html += '<div class="h-info"><div class="h-date">'+(r.date||'')+'</div><div class="h-meta">'+(r.note||'')+'</div></div>';
      html += '<div class="h-trend">'+tr+'</div>';
      html += '</div>';
    });
    html += '</div>';
    html += '</div>';
  });

  if(!hasAny){
    html += '<div class="empty"><div class="ei">📋</div><p>لم تجرِ أي اختبار بعد</p><p style="font-size:.8rem;margin-top:8px">ابدأ اختباراً وستظهر نتائجك هنا</p></div>';
  }

  el.innerHTML = html;
}

render();
</script>




</body>
</html>
