<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المساعد القانوني — بوابة المذاكرة</title>
<meta name="theme-color" content="#0d1117">
<style>
:root{
  --gold:#c9a84c;--gold2:#e8c96a;
  --dark:#0d1117;--dark2:#161b22;--dark3:#1c2333;
  --card:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;--blue:#58a6ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Tahoma','Arial',sans-serif;background:var(--dark);color:var(--text);height:100vh;direction:rtl;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{background:var(--dark3);border-bottom:2px solid var(--gold);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:7px 14px;border-radius:10px;text-decoration:none;font-size:.86rem;font-weight:700;}
.topbar-title{color:var(--gold);font-size:.95rem;font-weight:700;flex:1;}
.topbar-sub{font-size:.72rem;color:var(--muted);}

/* MESSAGES */
.msgs-wrap{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;max-width:800px;width:100%;margin:0 auto;}
.msgs-wrap::-webkit-scrollbar{width:5px;}
.msgs-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.msg{display:flex;gap:10px;animation:msgIn .25s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}

.msg-ico{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.msg.bot .msg-ico{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.25);}
.msg.user .msg-ico{background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.2);}

.msg-bubble{max-width:78%;padding:12px 16px;border-radius:16px;font-size:.92rem;line-height:1.9;}
.msg.bot .msg-bubble{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px 16px 16px 16px;}
.msg.user .msg-bubble{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.25);color:#e8d48a;border-radius:16px 4px 16px 16px;}

/* TYPING */
.typing{display:flex;gap:5px;align-items:center;padding:4px 0;}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:dotB 1.2s ease-in-out infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes dotB{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* SUGGESTIONS */
.sugs{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;max-width:800px;width:100%;margin:0 auto;flex-shrink:0;}
.sug{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:var(--gold);padding:7px 14px;border-radius:20px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:inherit;}
.sug:hover{background:rgba(201,168,76,.18);}

/* INPUT */
.input-wrap{padding:14px 16px;border-top:1px solid var(--border);background:var(--dark2);flex-shrink:0;}
.input-row{display:flex;gap:10px;align-items:flex-end;max-width:800px;margin:0 auto;}
.inp{flex:1;background:var(--dark3);border:1.5px solid var(--border);border-radius:14px;color:var(--text);padding:12px 16px;font-family:inherit;font-size:.92rem;height:46px;direction:rtl;transition:border-color .2s;}
.inp:focus{outline:none;border-color:var(--gold);}
.inp::placeholder{color:var(--muted);}
.send-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;width:46px;height:46px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.05);}
.send-btn:disabled{opacity:.4;cursor:default;transform:none;}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← الرئيسية</a>
  <div>
    <div class="topbar-title">⚖️ المساعد القانوني</div>
    <div class="topbar-sub">متخصص في القوانين العُمانية</div>
  </div>
</div>

<div class="msgs-wrap" id="msgs">
  <div class="msg bot">
    <div class="msg-ico">⚖️</div>
    <div class="msg-bubble">مرحباً! أنا مساعدك القانوني المتخصص في القوانين العُمانية.<br>اسألني عن أي مادة أو موضوع قانوني وسأساعدك 📚</div>
  </div>
</div>

<div class="sugs" id="sugs">
  <button class="sug" onclick="askSug(this)">ما تعريف الجريمة؟</button>
  <button class="sug" onclick="askSug(this)">شروط تعيين رجل الشرطة</button>
  <button class="sug" onclick="askSug(this)">أركان الزواج</button>
  <button class="sug" onclick="askSug(this)">عقوبة الإرهاب</button>
  <button class="sug" onclick="askSug(this)">مدة الاستيداع</button>
  <button class="sug" onclick="askSug(this)">سن التقاعد الإلزامي</button>
  <button class="sug" onclick="askSug(this)">حضانة الأطفال</button>
  <button class="sug" onclick="askSug(this)">شروط التجنيس</button>
</div>

<div class="input-wrap">
  <div class="input-row">
    <input type="text" class="inp" id="inp" placeholder="اكتب سؤالك هنا..."
      onkeydown="if(event.key==='Enter'){event.preventDefault();send();}">
    <button class="send-btn" id="send-btn" onclick="send()">➤</button>
  </div>
</div>

<script>
var chatHistory = [];
var busy = false;

function askSug(btn){
  document.getElementById('inp').value = btn.textContent;
  document.getElementById('sugs').style.display = 'none';
  send();
}

function getSmartAnswer(q){
  var r = getAnswer(q);
  return r || 'يمكنني مساعدتك في القوانين العمانية. اسأل عن موضوع محدد مثل: الجريمة، التفتيش، الزواج، الطلاق، الجنسية، الإرهاب، الشرطة.';
}

function getAnswer(q){
  if(q.indexOf('تفتيش قضائي') > -1 || q.indexOf('التفتيش القضائي') > -1)
    return 'التفتيش القضائي: إجراء تحقيقي للكشف عن الأدلة المادية.\n\nشروطه:\n• إذن من المحكمة المختصة\n• وجود دلائل كافية\n• في أوقات محددة (النهار عادة)\n\nالاستثناء: يجوز ليلاً في حالة التلبس أو الخطر الداهم.';
  if(q.indexOf('تلبس') > -1)
    return 'التلبس بالجريمة (م.37):\n• مشاهدة الجريمة حال ارتكابها\n• ضبط الجاني بعدها بوقت قصير\n• وجود آثار تدل على ارتكابها\n\nأثره: يجيز القبض بدون أمر قضائي.';
  if(q.indexOf('استجواب') > -1)
    return 'الاستجواب: مناقشة المتهم في الأدلة المنسوبة إليه.\n\nضماناته:\n• بحضور المحامي\n• حق الصمت\n• لا إكراه أو تهديد\n• الإقرار تحت الإكراه باطل';
  if(q.indexOf('قبض') > -1 || q.indexOf('توقيف') > -1)
    return 'القبض والتوقيف:\n• لا يجوز إلا بأمر قضائي أو حالة التلبس\n• مدة التوقيف الأولى: 48 ساعة\n• أقصى مدة في الجنح: 6 أشهر\n• أقصى مدة في الجنايات: سنة قابلة للتمديد';
  if(q.indexOf('دعوى') > -1)
    return 'الدعوى الجزائية:\n• تُحرَّك من النيابة أو المجني عليه\n• تسقط بالتقادم: 10 سنوات للجنايات، 3 للجنح، سنة للمخالفات\n• تنقضي بالوفاة أو العفو';
  if(q.indexOf('نيابة') > -1 || q.indexOf('مدعي عام') > -1)
    return 'النيابة العامة:\n• تمثل المجتمع في الدعوى الجزائية\n• تختص بالتحقيق والاتهام\n• تملك حفظ القضية أو إحالتها للمحكمة\n• تشرف على تنفيذ الأحكام';
  if(q.indexOf('جريمة') > -1)
    return 'الجريمة: كل فعل أو امتناع يعاقب عليه القانون.\n\nأنواعها:\n• جنايات: الإعدام أو السجن المؤبد أو المؤقت\n• جنح: السجن قصير أو الغرامة\n• مخالفات: أخف الجرائم';
  if(q.indexOf('تعيين') > -1 && q.indexOf('شرطة') > -1)
    return 'شروط التعيين في الشرطة (م.12):\n• عماني الجنسية\n• بالغ سن الرشد\n• غير محكوم عليه بجريمة مخلة بالشرف\n• لائق طبيا\n• حسن السيرة';
  if(q.indexOf('ترقية') > -1)
    return 'الترقية في الشرطة:\n• رائد فأدنى: بالأقدمية والكفاءة\n• مقدم فأعلى: بالاختيار المطلق\n• لا تجوز أثناء التحقيق أو الوقف (م.75)';
  if(q.indexOf('علاوة') > -1)
    return 'العلاوة الدورية (م.28):\n• بعد سنة من التعيين أو آخر ترقية\n• العلاوة الاستثنائية تشترط تقدير ممتاز\n• الحد الأقصى: 4 علاوات في الرتبة';
  if(q.indexOf('استيداع') > -1)
    return 'الاستيداع (م.88):\n• المدة: لا تتجاوز سنتين\n• الراتب: ثلثا الراتب الأساسي\n• يصدر بأمر من جلالة السلطان\n• إذا انقضت المدة دون إعادة تنتهي الخدمة';
  if(q.indexOf('تقاعد') > -1)
    return 'سن التقاعد (م.89):\n• الضباط: 60 سنة\n• يجوز الإحالة بعد 27 سنة خدمة';
  if(q.indexOf('انتهاء الخدمة') > -1 || q.indexOf('استقالة') > -1)
    return 'انتهاء الخدمة (م.89-90):\n• التقاعد الإلزامي: 60 سنة\n• الاستقالة: بموافقة المفتش العام\n• الفصل التأديبي: بقرار المفتش العام أو المحاكم العسكرية';
  if(q.indexOf('تأديب') > -1 || q.indexOf('انضباط') > -1)
    return 'العقوبات التأديبية في الشرطة:\n\nللضباط: التنبيه، الإنذار، الخصم، الوقف، التسريح\n\nللرتب الأخرى: التنبيه، الإنذار، الحجز بالثكنة (حتى 15 يوما)، الخصم، الفصل';
  if(q.indexOf('أركان') > -1 || (q.indexOf('زواج') > -1 && q.indexOf('شرط') > -1))
    return 'أركان عقد الزواج:\n• الإيجاب والقبول\n• الولي\n• شاهدان عدلان\n• الزوجان خاليان من الموانع الشرعية\n• المهر';
  if(q.indexOf('مهر') > -1)
    return 'المهر:\n• يستحق كاملا بالدخول أو وفاة الزوج\n• يستحق نصفه بالطلاق قبل الدخول';
  if(q.indexOf('طلاق') > -1)
    return 'أنواع الطلاق:\n• رجعي: للزوج المراجعة خلال العدة\n• بائن صغرى: يحتاج عقدا جديدا\n• بائن كبرى (الثلاث): لا تحل له حتى تنكح زوجا آخر';
  if(q.indexOf('عدة') > -1)
    return 'العدة:\n• المطلقة: 3 قروء\n• المتوفى عنها: 4 أشهر و10 أيام\n• الحامل: حتى الوضع';
  if(q.indexOf('نفقة') > -1)
    return 'النفقة:\n• واجبة على الزوج لزوجته وأولاده\n• تسقط بنشوز الزوجة\n• تشمل: الطعام والكساء والمسكن والعلاج';
  if(q.indexOf('حضانة') > -1)
    return 'الحضانة (م.159):\n• الذكر: حتى 9 سنوات عند الأم ثم الأب\n• الأنثى: حتى 11 سنة عند الأم ثم الأب';
  if(q.indexOf('رضاع') > -1)
    return 'الرضاع (م.28):\n• يحرم ما يحرم بالنسب\n• شرطه: خمس رضعات فأكثر في مدة الرضاعة';
  if(q.indexOf('لعان') > -1)
    return 'اللعان: يترتب عليه الفرقة الأبدية بين الزوجين ونفي النسب.';
  if(q.indexOf('تجنيس') > -1 || q.indexOf('جنسية') > -1)
    return 'شروط التجنيس (م.8):\n• إقامة قانونية متواصلة 20 سنة\n• بلوغ سن الرشد\n• حسن السيرة\n• زوجة العماني: بعد 3 سنوات من الزواج';
  if(q.indexOf('لقيط') > -1)
    return 'اللقيط (م.2-3):\n• المولود في عمان مجهول الأبوين\n• يعد عمانيا بقوة القانون';
  if(q.indexOf('ازدواج') > -1)
    return 'ازدواج الجنسية (م.26):\n• محظور على العمانيين\n• الاستثناء: إذن خاص من جلالة السلطان';
  if(q.indexOf('إسقاط الجنسية') > -1)
    return 'إسقاط الجنسية:\n• يصدر بمرسوم سلطاني فقط (م.19)\n• لا تملكه أي جهة أخرى';
  if(q.indexOf('إرهاب') > -1 || q.indexOf('ارهاب') > -1)
    return 'عقوبات الإرهاب:\n• قيادة المنظمة: السجن المؤبد (م.11)\n• الانضمام كعضو: 10-20 سنة (م.12)\n• تمويل الإرهاب: 7-15 سنة (م.20)\n• الاعتداء على السلطان: الإعدام (م.9)';
  if(q.indexOf('قضاء عسكري') > -1 || q.indexOf('محكمة عسكرية') > -1)
    return 'المحاكم العسكرية:\n• ابتدائية: الجنح والجنايات البسيطة\n• عليا: الجنايات الكبرى وجرائم الضباط حتى رتبة رائد\n• رئيس القضاء العسكري: لا تقل رتبته عن عميد';
  if(q.indexOf('حبس احتياطي') > -1)
    return 'الحبس الاحتياطي:\n• بأمر قضائي للتحقق من التهمة\n• مدته الأولى: 48 ساعة قابلة للتمديد\n• أقصى مدة في الجنح: 6 أشهر\n• أقصى مدة في الجنايات: سنة قابلة للتمديد';
  if(q.indexOf('تقادم') > -1)
    return 'التقادم:\n• الجرائم الانضباطية: 3 سنوات (م.60)\n• جنايات عادية: 10 سنوات\n• جنح: 3 سنوات\n• مخالفات: سنة';
  if(q.indexOf('إثبات') > -1 || q.indexOf('دليل') > -1)
    return 'وسائل الإثبات الجزائي:\n• الاعتراف (يجب أن يكون طوعيا)\n• شهادة الشهود\n• الأدلة المادية والتقنية\n• الخبرة الجنائية\n\nمبدأ: المتهم بريء حتى تثبت إدانته';
  if(q.indexOf('بلاغ') > -1 || q.indexOf('شكوى') > -1)
    return 'البلاغ: يقدمه أي شخص عن جريمة أو حادث.\nالشكوى: تقدمها المجني عليه أو وكيله الشرعي.\n\nبعض الجرائم لا تحرك إلا بشكوى.';
  if(q.indexOf('إجازة') > -1 && q.indexOf('مرض') > -1)
    return 'الإجازة المرضية (م.44-45):\n• 6 أشهر براتب كامل\n• ثم 6 أشهر بنصف راتب\n• إذا كان المرض بسبب الوظيفة: السنتان كاملتان براتب كامل';
  return null;
}

function send(){
  if(busy) return;
  var inp = document.getElementById('inp');
  var q = inp.value.trim();
  if(!q) return;
  inp.value = '';
  document.getElementById('sugs').style.display = 'none';
  document.getElementById('send-btn').disabled = true;
  busy = true;
  addMsg('user', q);
  chatHistory.push({role:'user', content:q});
  var tid = 'typing_'+Date.now();
  addTyping(tid);
  setTimeout(function(){
    removeTyping(tid);
    var ans = getSmartAnswer(q.toLowerCase());
    chatHistory.push({role:'assistant', content:ans});
    addMsg('bot', ans);
    busy = false;
    document.getElementById('send-btn').disabled = false;
    inp.focus();
  }, 600);
}

function addMsg(role, text){
  var msgs = document.getElementById('msgs');
  var ico = role==='bot' ? '⚖️' : '👤';
  var d = document.createElement('div');
  d.className = 'msg '+role;
  d.innerHTML = '<div class="msg-ico">'+ico+'</div><div class="msg-bubble">'+text.replace(/\n/g,'<br>')+'</div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping(id){
  var msgs = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg bot'; d.id = id;
  d.innerHTML = '<div class="msg-ico">⚖️</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping(id){
  var el = document.getElementById(id);
  if(el) el.remove();
}
</script>
</body>
</html>
