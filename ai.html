<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المساعد القانوني — بوابة المذاكرة</title>
<meta name="theme-color" content="#0d1117">
<style>
:root{
  --gold:#c9a84c;--gold2:#e8c96a;
  --dark:#0d1117;--dark2:#161b22;--dark3:#1c2333;
  --card:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;--blue:#58a6ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Tahoma','Arial',sans-serif;background:var(--dark);color:var(--text);height:100vh;direction:rtl;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{background:var(--dark3);border-bottom:2px solid var(--gold);padding:12px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:7px 14px;border-radius:10px;text-decoration:none;font-size:.86rem;font-weight:700;}
.topbar-title{color:var(--gold);font-size:.95rem;font-weight:700;flex:1;}
.topbar-sub{font-size:.72rem;color:var(--muted);}

/* MESSAGES */
.msgs-wrap{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px;max-width:800px;width:100%;margin:0 auto;}
.msgs-wrap::-webkit-scrollbar{width:5px;}
.msgs-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.msg{display:flex;gap:10px;animation:msgIn .25s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}

.msg-ico{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.msg.bot .msg-ico{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.25);}
.msg.user .msg-ico{background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.2);}

.msg-bubble{max-width:78%;padding:12px 16px;border-radius:16px;font-size:.92rem;line-height:1.9;}
.msg.bot .msg-bubble{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:4px 16px 16px 16px;}
.msg.user .msg-bubble{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.08));border:1px solid rgba(201,168,76,.25);color:#e8d48a;border-radius:16px 4px 16px 16px;}

/* TYPING */
.typing{display:flex;gap:5px;align-items:center;padding:4px 0;}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:dotB 1.2s ease-in-out infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes dotB{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* SUGGESTIONS */
.sugs{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;max-width:800px;width:100%;margin:0 auto;flex-shrink:0;}
.sug{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);color:var(--gold);padding:7px 14px;border-radius:20px;font-size:.82rem;cursor:pointer;transition:all .2s;font-family:inherit;}
.sug:hover{background:rgba(201,168,76,.18);}

/* INPUT */
.input-wrap{padding:14px 16px;border-top:1px solid var(--border);background:var(--dark2);flex-shrink:0;}
.input-row{display:flex;gap:10px;align-items:flex-end;max-width:800px;margin:0 auto;}
.inp{flex:1;background:var(--dark3);border:1.5px solid var(--border);border-radius:14px;color:var(--text);padding:12px 16px;font-family:inherit;font-size:.92rem;height:46px;direction:rtl;transition:border-color .2s;}
.inp:focus{outline:none;border-color:var(--gold);}
.inp::placeholder{color:var(--muted);}
.send-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;width:46px;height:46px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:all .2s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.05);}
.send-btn:disabled{opacity:.4;cursor:default;transform:none;}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← الرئيسية</a>
  <div>
    <div class="topbar-title">⚖️ المساعد القانوني</div>
    <div class="topbar-sub">متخصص في القوانين العُمانية</div>
  </div>
</div>

<div class="msgs-wrap" id="msgs">
  <div class="msg bot">
    <div class="msg-ico">⚖️</div>
    <div class="msg-bubble">مرحباً! أنا مساعدك القانوني المتخصص في القوانين العُمانية.<br>اسألني عن أي مادة أو موضوع قانوني وسأساعدك 📚</div>
  </div>
</div>

<div class="sugs" id="sugs">
  <button class="sug" onclick="askSug(this)">ما تعريف الجريمة؟</button>
  <button class="sug" onclick="askSug(this)">شروط تعيين رجل الشرطة</button>
  <button class="sug" onclick="askSug(this)">أركان الزواج</button>
  <button class="sug" onclick="askSug(this)">عقوبة الإرهاب</button>
  <button class="sug" onclick="askSug(this)">مدة الاستيداع</button>
  <button class="sug" onclick="askSug(this)">سن التقاعد الإلزامي</button>
  <button class="sug" onclick="askSug(this)">حضانة الأطفال</button>
  <button class="sug" onclick="askSug(this)">شروط التجنيس</button>
</div>

<div class="input-wrap">
  <div class="input-row">
    <input type="text" class="inp" id="inp" placeholder="اكتب سؤالك هنا..."
      onkeydown="if(event.key==='Enter'){event.preventDefault();send();}">
    <button class="send-btn" id="send-btn" onclick="send()">➤</button>
  </div>
</div>

<script>
var history = [];
var busy = false;

function askSug(btn){
  document.getElementById('inp').value = btn.textContent;
  document.getElementById('sugs').style.display = 'none';
  send();
}

function getSmartAnswer(q){
  q = q.toLowerCase();
  if(q.includes('جريمة'))
    return 'الجريمة: كل فعل أو امتناع عن فعل يُعاقب عليه القانون. وتنقسم إلى:\n• جنايات: عقوبتها الإعدام أو السجن المؤبد أو المؤقت\n• جنح: عقوبتها الغرامة أو السجن قصير المدة\n• مخالفات: أخف الجرائم';
  if(q.includes('تعيين')&&q.includes('شرطة'))
    return 'شروط التعيين في الشرطة (م.12):\n• عُماني الجنسية\n• بالغ سن الرشد\n• غير محكوم عليه بجريمة مخلة بالشرف\n• لائق طبياً\n• حسن السيرة والسلوك\n• مستوف الشروط التعليمية المطلوبة';
  if(q.includes('أركان')&&q.includes('زواج'))
    return 'أركان عقد الزواج:\n• الإيجاب والقبول\n• الولي\n• شاهدان عدلان\n• الزوجان الخاليان من الموانع الشرعية\n• المهر';
  if(q.includes('إرهاب')||q.includes('ارهاب'))
    return 'عقوبات الإرهاب:\n• قيادة المنظمة الإرهابية: السجن المؤبد (م.11)\n• الانضمام كعضو: 10-20 سنة (م.12)\n• تمويل الإرهاب: 7-15 سنة (م.20)\n• إخفاء إرهابي: 3-10 سنوات (م.15)\n• الاعتداء على شخص السلطان: الإعدام (م.9)';
  if(q.includes('استيداع'))
    return 'الاستيداع (م.88):\n• المدة: لا تتجاوز سنتين\n• الراتب: ثلثا الراتب الأساسي\n• يصدر بأمر من جلالة السلطان\n• إذا انقضت المدة دون إعادة: تنتهي الخدمة';
  if(q.includes('تقاعد'))
    return 'سن التقاعد الإلزامي (م.89):\n• الضباط: 60 سنة\n• يجوز الإحالة للتقاعد بعد 27 سنة خدمة';
  if(q.includes('حضانة'))
    return 'الحضانة (م.159):\n• الذكر: حتى 9 سنوات عند الأم، ثم ينتقل للأب\n• الأنثى: حتى 11 سنة عند الأم، ثم تنتقل للأب';
  if(q.includes('تجنيس')||q.includes('جنسية'))
    return 'شروط التجنيس (م.8):\n• إقامة قانونية متواصلة 20 سنة\n• بلوغ سن الرشد (18 سنة)\n• حسن السيرة\n• القدرة على الإعالة\n• أما زوجة العُماني: بعد 3 سنوات من الزواج';
  if(q.includes('مهر'))
    return 'المهر:\n• يُستحق كاملاً بالدخول أو وفاة الزوج\n• يُستحق نصفه بالطلاق قبل الدخول\n• لا حد أقصى للمهر في القانون العُماني';
  if(q.includes('طلاق'))
    return 'أنواع الطلاق:\n• رجعي: للزوج حق المراجعة خلال العدة\n• بائن بينونة صغرى: يحتاج عقداً جديداً\n• بائن بينونة كبرى (الثلاث): لا تحل له حتى تنكح زوجاً آخر';
  if(q.includes('عدة'))
    return 'العدة:\n• المطلقة: 3 قروء (حيضات)\n• المتوفى عنها: 4 أشهر و10 أيام\n• الحامل: حتى الوضع';
  if(q.includes('إجازة')&&q.includes('مرض'))
    return 'الإجازة المرضية (م.44-45):\n• 6 أشهر براتب كامل\n• ثم 6 أشهر بنصف راتب\n• إذا كان المرض بسبب الوظيفة: السنتان كاملتان براتب كامل';
  if(q.includes('تقادم')&&(q.includes('انضباط')||q.includes('جريمة')))
    return 'التقادم (م.60):\n• الجرائم الانضباطية: 3 سنوات\n• جنايات القضاء العسكري: 20 سنة\n• جنح القضاء العسكري: 10 سنوات';
  if(q.includes('لجنة شؤون الشرطة'))
    return 'لجنة شؤون الشرطة (م.9):\n• تتكون من رئيس وثلاثة أعضاء أو أكثر\n• لا تقل رتبتهم عن عقيد\n• تختص بشؤون الترقية والتأديب';
  return 'سؤال مهم! للإجابة الدقيقة يُنصح بمراجعة النص القانوني المحدد.\n\nيمكنني مساعدتك في:\n• قانون الشرطة العُمانية\n• قانون الجنسية\n• قانون الأحوال الشخصية\n• قانون مكافحة الإرهاب\n• قانون القضاء العسكري\n\nاسأل عن موضوع محدد وسأعطيك إجابة أدق 😊';
}

async function send(){
  if(busy) return;
  var inp = document.getElementById('inp');
  var q = inp.value.trim();
  if(!q) return;
  inp.value = '';
  document.getElementById('sugs').style.display = 'none';
  document.getElementById('send-btn').disabled = true;
  busy = true;

  addMsg('user', q);
  history.push({role:'user', content:q});

  var tid = 'typing_'+Date.now();
  addTyping(tid);

  await new Promise(function(r){setTimeout(r, 600);});
  
  removeTyping(tid);
  var ans = getSmartAnswer(q);
  history.push({role:'assistant', content:ans});
  addMsg('bot', ans);

  busy = false;
  document.getElementById('send-btn').disabled = false;
  inp.focus();
}

function addMsg(role, text){
  var msgs = document.getElementById('msgs');
  var ico = role==='bot' ? '⚖️' : '👤';
  var d = document.createElement('div');
  d.className = 'msg '+role;
  d.innerHTML = '<div class="msg-ico">'+ico+'</div><div class="msg-bubble">'+text.replace(/\n/g,'<br>')+'</div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping(id){
  var msgs = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg bot'; d.id = id;
  d.innerHTML = '<div class="msg-ico">⚖️</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping(id){
  var el = document.getElementById(id);
  if(el) el.remove();
}
</script>
</body>
</html>
