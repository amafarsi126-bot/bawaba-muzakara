<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منهاج الشرطة المستجدين — بوابة المذاكرة</title>
<meta name="theme-color" content="#0d1117">
<style>
:root{
  --gold:#c9a84c;--gold2:#e8c96a;
  --dark:#0d1117;--dark2:#161b22;--dark3:#1c2333;
  --card:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Tahoma','Arial',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;direction:rtl;padding-bottom:40px;}
.topbar{background:var(--dark3);border-bottom:2px solid var(--gold);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.back-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:7px 14px;border-radius:10px;text-decoration:none;font-size:.86rem;font-weight:700;}
.topbar-title{color:var(--gold);font-size:.9rem;font-weight:700;flex:1;}

/* TABS */
.tabs-wrap{background:var(--dark2);border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;padding:0 12px;}
.tabs-wrap::-webkit-scrollbar{height:3px;}
.tabs-wrap::-webkit-scrollbar-thumb{background:var(--border);}
.tab{display:inline-block;padding:12px 16px;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.body{max-width:860px;margin:0 auto;padding:16px;}

/* START */
.start-card{background:var(--card);border:1.5px solid rgba(201,168,76,.3);border-radius:20px;padding:30px 20px;text-align:center;margin-bottom:20px;}
.start-ico{font-size:2.5rem;margin-bottom:12px;}
.start-title{font-size:1.2rem;font-weight:900;color:var(--gold);margin-bottom:6px;}
.start-sub{font-size:.85rem;color:var(--muted);margin-bottom:20px;line-height:1.8;}
.start-stats{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.sstat{background:var(--dark3);border:1px solid var(--border);border-radius:12px;padding:10px 16px;text-align:center;}
.sstat-num{font-size:1.4rem;font-weight:900;color:var(--gold);}
.sstat-lbl{font-size:.7rem;color:var(--muted);margin-top:2px;}
.start-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;border-radius:40px;padding:12px 40px;font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer;transition:all .3s;}

/* QUESTIONS */
.section-title{background:linear-gradient(135deg,var(--dark3),var(--dark2));border:1px solid rgba(201,168,76,.2);border-right:3px solid var(--gold);border-radius:10px;padding:10px 14px;font-size:.9rem;font-weight:700;color:var(--gold);margin:20px 0 12px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px;animation:fadeIn .3s ease;}
.q-num{font-size:.75rem;color:var(--muted);margin-bottom:6px;}
.q-text{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:12px;line-height:1.8;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s;font-size:.88rem;color:var(--text);background:transparent;text-align:right;font-family:inherit;width:100%;}
.opt:hover{background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.3);}
.opt.selected{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold);}
.opt.correct{background:rgba(63,185,80,.12);border-color:var(--green);color:var(--green);}
.opt.wrong{background:rgba(248,81,73,.1);border-color:var(--red);color:var(--red);}
.opt-c{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;}
.opt.selected .opt-c{border-color:var(--gold);color:var(--gold);}
.opt.correct .opt-c{border-color:var(--green);color:var(--green);}
.opt.wrong .opt-c{border-color:var(--red);color:var(--red);}
.opt[disabled]{cursor:default;pointer-events:none;}

/* SUBMIT BAR */
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(13,17,23,.97);border-top:2px solid rgba(201,168,76,.3);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);z-index:200;}
.submit-info{font-size:.82rem;color:var(--muted);}
.submit-info strong{color:var(--gold);}
.submit-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;border-radius:10px;padding:10px 24px;font-size:.9rem;font-weight:800;cursor:pointer;font-family:inherit;}

/* RESULT */
.result-card{background:var(--card);border:1.5px solid var(--gold);border-radius:16px;padding:24px;text-align:center;margin-bottom:16px;}
.result-score{font-size:3.5rem;font-weight:900;color:var(--gold);}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0;}
.rg{background:var(--dark3);border-radius:10px;padding:10px 6px;text-align:center;}
.rg-n{font-size:1.4rem;font-weight:900;}
.rg-l{font-size:.7rem;color:var(--muted);margin-top:2px;}
.retry-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;border-radius:30px;padding:10px 28px;font-family:inherit;font-size:.9rem;font-weight:800;cursor:pointer;}
.rv-item{background:var(--dark3);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:.84rem;line-height:1.8;}
.rv-ok{border-right:3px solid var(--green);}
.rv-no{border-right:3px solid var(--red);}

/* PROG */
.prog-wrap{height:3px;background:rgba(255,255,255,.08);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s;width:0%;}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← الرئيسية</a>
  <span class="topbar-title">📋 منهاج الشرطة المستجدين</span>
</div>
<div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>

<div class="tabs-wrap" id="tabs-wrap">
  <button class="tab active" onclick="selectTab(0)">الفصل الأول</button>
  <button class="tab" onclick="selectTab(1)">الفصل الثاني</button>
  <button class="tab" onclick="selectTab(2)">الفصل الثالث</button>
  <button class="tab" onclick="selectTab(3)">الفصل الرابع</button>
  <button class="tab" onclick="selectTab(4)">الفصل الخامس</button>
</div>

<div class="body">
  <div id="start-screen"></div>
  <div id="exam-screen" style="display:none">
    <div id="questions-wrap"></div>
  </div>
  <div id="result-wrap" style="display:none"></div>
</div>

<div class="submit-bar" id="submit-bar" style="display:none">
  <div class="submit-info">أجبت: <strong id="sub-done">0</strong> من <strong id="sub-total">0</strong></div>
  <button class="submit-btn" onclick="submitExam()">تسليم ✓</button>
</div>

<script>
var CHAPTERS = [
  {

    questions: [

var currentChapter = 0;
var currentQuestions = [];
var userAns = [];
var submitted = false;
var letters = ['أ','ب','ج','د'];

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function selectTab(idx){
  currentChapter = idx;
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',i===idx);});
  document.getElementById('exam-screen').style.display='none';
  document.getElementById('result-wrap').style.display='none';
  document.getElementById('submit-bar').style.display='none';
  document.getElementById('prog-fill').style.width='0%';
  showStart();
}

function showStart(){
  var ch = CHAPTERS[currentChapter];
  document.getElementById('start-screen').style.display='block';
  document.getElementById('start-screen').innerHTML =
    '<div class="start-card">' +
    '<div class="start-ico">📋</div>' +
    '<div class="start-title">'+ch.title+'</div>' +
    '<div class="start-sub">'+ch.sub+'</div>' +
    '<div class="start-stats">' +
    '<div class="sstat"><div class="sstat-num">'+ch.questions.length+'</div><div class="sstat-lbl">سؤال اختياري</div></div>' +
    '</div>' +
    '<button class="start-btn" onclick="startExam()">ابدأ الاختبار ✦</button>' +
    '</div>';
}

function startExam(){
  var ch = CHAPTERS[currentChapter];
  currentQuestions = shuffle(ch.questions);
  userAns = new Array(currentQuestions.length).fill(null);
  submitted = false;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('result-wrap').style.display='none';
  document.getElementById('exam-screen').style.display='block';
  document.getElementById('submit-bar').style.display='flex';
  document.getElementById('sub-total').textContent=currentQuestions.length;
  document.getElementById('sub-done').textContent='0';
  buildQuestions();
  window.scrollTo(0,0);
}

function buildQuestions(){
  var sections={};
  currentQuestions.forEach(function(q,i){
    if(!sections[q.t]) sections[q.t]=[];
    sections[q.t].push(i);
  });
  var html='';
  var qNum=0;
  Object.keys(sections).forEach(function(sec){
    html+='<div class="section-title">'+sec+'</div>';
    sections[sec].forEach(function(i){
      qNum++;
      var q=currentQuestions[i];
      var opts=shuffle(q.o.map(function(o,j){return{t:o,j:j};}));
      currentQuestions[i]._opts=opts;
      var oh=opts.map(function(o,k){
        return '<button class="opt" onclick="pick('+i+','+o.j+')" data-orig="'+o.j+'" id="opt-'+i+'-'+o.j+'">'+
          '<div class="opt-c">'+letters[k]+'</div>'+o.t+'</button>';
      }).join('');
      html+='<div class="q-card" id="qc-'+i+'"><div class="q-num">سؤال '+qNum+'</div>'+
        '<div class="q-text">'+q.q+'</div>'+
        '<div class="opts">'+oh+'</div></div>';
    });
  });
  document.getElementById('questions-wrap').innerHTML=html;
}

function pick(qi,origIdx){
  if(submitted) return;
  document.querySelectorAll('#qc-'+qi+' .opt').forEach(function(o){o.classList.remove('selected');});
  document.getElementById('opt-'+qi+'-'+origIdx).classList.add('selected');
  userAns[qi]=origIdx;
  var done=userAns.filter(function(a){return a!==null;}).length;
  document.getElementById('prog-fill').style.width=(done/currentQuestions.length*100)+'%';
  document.getElementById('sub-done').textContent=done;
}

function submitExam(){
  if(submitted) return;
  submitted=true;
  var ok=0,total=currentQuestions.length,rv='';
  currentQuestions.forEach(function(q,i){
    document.querySelectorAll('#qc-'+i+' .opt').forEach(function(o){
      o.disabled=true;
      var orig=parseInt(o.dataset.orig);
      if(orig===q.a) o.classList.add('correct');
      else if(o.classList.contains('selected')) o.classList.add('wrong');
    });
    if(userAns[i]===q.a){ok++;rv+='<div class="rv-item rv-ok">✅ '+q.q+'</div>';}
    else{rv+='<div class="rv-item rv-no">❌ '+q.q+'<br><span style="color:var(--red);font-size:.8rem">الصحيح: '+q.o[q.a]+'</span></div>';}
  });
  var pct=Math.round(ok/total*100);
  var grade=pct>=90?'🌟 ممتاز':pct>=80?'🏅 جيد جداً':pct>=70?'✨ جيد':pct>=60?'📚 مقبول':'💪 يحتاج مراجعة';
  document.getElementById('submit-bar').style.display='none';
  document.getElementById('result-wrap').style.display='block';
  document.getElementById('result-wrap').innerHTML=
    '<div class="result-card">'+
    '<div class="result-score">'+ok+'</div>'+
    '<div style="color:var(--muted);font-size:.9rem">من '+total+' سؤالاً</div>'+
    '<div style="font-size:1.2rem;font-weight:700;margin:10px 0">'+grade+'</div>'+
    '<div class="result-grid">'+
    '<div class="rg"><div class="rg-n" style="color:var(--green)">'+ok+'</div><div class="rg-l">✅ صحيح</div></div>'+
    '<div class="rg"><div class="rg-n" style="color:var(--red)">'+(total-ok)+'</div><div class="rg-l">❌ خطأ</div></div>'+
    '<div class="rg"><div class="rg-n" style="color:var(--gold)">'+pct+'%</div><div class="rg-l">🏆 النسبة</div></div>'+
    '</div>'+
    '<button class="retry-btn" onclick="startExam()">🔄 إعادة</button>'+
    '</div>'+
    '<div class="result-card"><div style="font-weight:700;color:var(--gold);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px">📋 المراجعة</div>'+rv+'</div>';
  document.getElementById('result-wrap').scrollIntoView({behavior:'smooth'});
}

// Init
showStart();
</script>
