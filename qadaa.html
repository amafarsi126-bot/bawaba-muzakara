<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القضاء العسكري — بوابة المذاكرة</title>
<meta name="theme-color" content="#0d1117">
<style>
:root{
  --gold:#c9a84c;--gold2:#e8c96a;
  --dark:#0d1117;--dark2:#161b22;--dark3:#1c2333;
  --card:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;--blue:#58a6ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Tahoma','Arial',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;direction:rtl;font-size:16px;padding-bottom:80px;}
.topbar{background:var(--dark3);border-bottom:2px solid var(--gold);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.back-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:7px 14px;border-radius:10px;text-decoration:none;font-size:.86rem;font-weight:700;}
.topbar-title{color:var(--gold);font-size:.95rem;font-weight:700;flex:1;}
.prog-wrap{height:4px;background:rgba(255,255,255,.08);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s;width:0%;}
.start-wrap{max-width:600px;margin:40px auto;padding:0 16px;}
.start-card{background:var(--card);border:1.5px solid rgba(201,168,76,.3);border-radius:20px;padding:36px 24px;text-align:center;}
.start-ico{font-size:3rem;margin-bottom:16px;}
.start-title{font-size:1.4rem;font-weight:900;color:var(--gold);margin-bottom:8px;}
.start-sub{font-size:.88rem;color:var(--muted);margin-bottom:28px;line-height:1.8;}
.start-stats{display:flex;justify-content:center;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.sstat{background:var(--dark3);border:1px solid var(--border);border-radius:14px;padding:12px 20px;text-align:center;}
.sstat-num{font-size:1.6rem;font-weight:900;color:var(--gold);}
.sstat-lbl{font-size:.72rem;color:var(--muted);margin-top:3px;}
.start-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;border-radius:40px;padding:14px 46px;font-family:inherit;font-size:1.05rem;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.35);transition:all .3s;}
.start-btn:hover{transform:scale(1.03);}
.body{max-width:860px;margin:0 auto;padding:20px 16px;}
.section-title{background:linear-gradient(135deg,var(--dark3),var(--dark2));border:1px solid rgba(201,168,76,.2);border-right:3px solid var(--gold);border-radius:10px;padding:12px 16px;font-size:.95rem;font-weight:700;color:var(--gold);margin:24px 0 16px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 18px;margin-bottom:12px;transition:border-color .2s;animation:fadeIn .3s ease;}
.q-card.answered{border-color:rgba(201,168,76,.35);}
.q-num{font-size:.78rem;color:var(--muted);margin-bottom:8px;}
.q-text{font-size:.98rem;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.8;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:center;gap:12px;padding:11px 15px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s;font-size:.9rem;color:var(--text);background:transparent;text-align:right;font-family:inherit;width:100%;}
.opt:hover{background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.3);}
.opt.selected{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold);}
.opt.correct{background:rgba(63,185,80,.12);border-color:var(--green);color:var(--green);}
.opt.wrong{background:rgba(248,81,73,.1);border-color:var(--red);color:var(--red);}
.opt-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;}
.opt.selected .opt-circle{border-color:var(--gold);color:var(--gold);}
.opt.correct .opt-circle{border-color:var(--green);color:var(--green);}
.opt.wrong .opt-circle{border-color:var(--red);color:var(--red);}
.opt[disabled]{cursor:default;pointer-events:none;}
.essay-ta{width:100%;min-height:100px;background:var(--dark3);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:12px 14px;font-family:inherit;font-size:.9rem;resize:vertical;direction:rtl;line-height:1.8;margin-top:8px;}
.essay-ta:focus{outline:none;border-color:var(--gold);}
.essay-ta::placeholder{color:var(--muted);}
.model-ans{display:none;margin-top:12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-right:3px solid var(--gold);border-radius:10px;padding:12px 14px;font-size:.86rem;color:var(--gold2);line-height:1.8;}
.model-ans.show{display:block;}
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(13,17,23,.97);border-top:2px solid rgba(201,168,76,.3);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;backdrop-filter:blur(12px);z-index:200;}
.submit-info{font-size:.84rem;color:var(--muted);}
.submit-info strong{color:var(--gold);}
.submit-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;border-radius:12px;padding:12px 28px;font-size:.95rem;font-weight:800;cursor:pointer;font-family:inherit;}
.result-wrap{max-width:700px;margin:28px auto;padding:0 16px;display:none;}
.result-card{background:var(--card);border:1.5px solid var(--gold);border-radius:18px;padding:28px 20px;text-align:center;margin-bottom:20px;}
.result-score{font-size:4rem;font-weight:900;color:var(--gold);line-height:1;}
.result-total{font-size:1rem;color:var(--muted);margin-top:4px;}
.result-grade{font-size:1.4rem;font-weight:700;margin:12px 0;}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.rg-item{background:var(--dark3);border-radius:10px;padding:12px 8px;text-align:center;}
.rg-num{font-size:1.5rem;font-weight:900;}
.rg-lbl{font-size:.72rem;color:var(--muted);margin-top:3px;}
.retry-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;border-radius:30px;padding:12px 32px;font-family:inherit;font-size:.95rem;font-weight:800;cursor:pointer;margin-top:8px;}
.review-title{font-size:.9rem;font-weight:700;color:var(--gold);margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:10px;}
.rv-item{background:var(--dark3);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:.86rem;line-height:1.8;}
.rv-ok{border-right:3px solid var(--green);}
.rv-no{border-right:3px solid var(--red);}
.rv-q{color:var(--text);margin-bottom:4px;font-weight:600;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← الرئيسية</a>
  <span class="topbar-title">⚖️ القضاء العسكري</span>
</div>
<div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>

<div class="start-wrap" id="start-screen">
  <div class="start-card">
    <div class="start-ico">⚖️</div>
    <div class="start-title">القضاء العسكري</div>
    <div class="start-sub">المرسوم السلطاني ٢٠٢٢/٨٧ — اختبار شامل</div>
    <div class="start-stats">
      <div class="sstat"><div class="sstat-num">50</div><div class="sstat-lbl">سؤال اختياري</div></div>
      <div class="sstat"><div class="sstat-num">15</div><div class="sstat-lbl">سؤال مقالي</div></div>
    </div>
    <button class="start-btn" onclick="startExam()">ابدأ الاختبار ✦</button>
  </div>
</div>

<div class="body" id="exam-body" style="display:none">
  <div id="questions-wrap"></div>
</div>

<div class="result-wrap" id="result-wrap">
  <div class="result-card">
    <div class="result-score" id="res-score">0</div>
    <div class="result-total" id="res-total"></div>
    <div class="result-grade" id="res-grade"></div>
    <div class="result-grid">
      <div class="rg-item"><div class="rg-num" id="rg-right" style="color:var(--green)">0</div><div class="rg-lbl">✅ صحيح</div></div>
      <div class="rg-item"><div class="rg-num" id="rg-wrong" style="color:var(--red)">0</div><div class="rg-lbl">❌ خطأ</div></div>
      <div class="rg-item"><div class="rg-num" id="rg-pct" style="color:var(--gold)">0%</div><div class="rg-lbl">🏆 النسبة</div></div>
    </div>
    <button class="retry-btn" onclick="location.reload()">🔄 إعادة الاختبار</button>
  </div>
  <div class="result-card" id="review-wrap">
    <div class="review-title">📋 مراجعة الإجابات</div>
    <div id="review-list"></div>
  </div>
</div>

<div class="submit-bar" id="submit-bar" style="display:none">
  <div class="submit-info">أجبت: <strong id="sub-done">0</strong> من <strong id="sub-total">0</strong></div>
  <button class="submit-btn" onclick="submitExam()">تسليم الاختبار ✓</button>
</div>

<script>
const questions = [
        // --- 50 سؤال اختياري ---
        { type: "MCQ", q: "يُعين رئيس القضاء العسكري بأمر سلطاني، ولا تقل رتبته عن:", a: ["عقيد", "عميد", "لواء"], c: 1 },
        { type: "MCQ", q: "تنعقد المحكمة العسكرية العليا من هيئة مشكلة من:", a: ["3 قضاة", "5 قضاة", "7 قضاة"], c: 1 },
        { type: "MCQ", q: "مدة الحبس الاحتياطي التي يملكها عضو الادعاء العسكري قبل التمديد من المحكمة هي:", a: ["48 ساعة", "7 أيام", "15 يوماً"], c: 1 },
        { type: "MCQ", q: "الطعن بالنقض في الأحكام العسكرية يُقدم خلال مدة:", a: ["15 يوماً", "30 يوماً", "60 يوماً"], c: 1 },
        { type: "MCQ", q: "لا تسقط الدعوى الجزائية بالتقادم في جرائم:", a: ["السرقة والاختلاس", "التجسس والفتنة والتمرد", "إهمال العهدة"], c: 1 },
        { type: "MCQ", q: "يؤدي أعضاء القضاء العسكري اليمين القانونية أمام:", a: ["رئيس المحكمة العليا", "الوزير", "رئيس الادعاء العسكري"], c: 1 },
        { type: "MCQ", q: "تنفذ عقوبة الإعدام في العسكريين عن طريق:", a: ["الشنق", "رمياً بالرصاص", "السيف"], c: 1 },
        { type: "MCQ", q: "رتبة رئيس الادعاء العسكري يجب ألا تقل عن:", a: ["مقدم", "عقيد", "عميد"], c: 1 },
        { type: "MCQ", q: "تختص المحكمة العسكرية الابتدائية بنظر الجنايات إذا كانت مشكلة من:", a: ["قاضٍ واحد", "3 قضاة", "5 قضاة"], c: 1 },
        { type: "MCQ", q: "يسقط الحق في الاعتراض على الحكم الغيابي في الجنح بمضي:", a: ["5 أيام", "10 أيام", "15 يوماً"], c: 1 },
        { type: "MCQ", q: "عقوبة 'الطرد' من الخدمة يترتب عليها الحرمان من المعاش:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "لا يجوز تنفيذ عقوبة الإعدام إلا بعد تصديق:", a: ["وزير الدفاع", "رئيس القضاء العسكري", "القائد الأعلى"], c: 2 },
        { type: "MCQ", q: "يعتبر 'مفقوداً' العسكري الذي تنقطع أخباره أثناء العمليات الحربية:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "تسقط عقوبة الجناية العسكرية بمضي:", a: ["10 سنوات", "15 سنة", "20 سنة"], c: 2 },
        { type: "MCQ", q: "تعتبر 'مخالفة الأوامر' جريمة إذا صدرت من رئيس لمرؤوسه:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "يعاقب بالسجن مدة لا تقل عن 5 سنوات كل من حرض عسكرياً على الفرار:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "تنعقد محكمة الاستئناف العسكرية برئاسة قاضٍ لا تقل رتبته عن:", a: ["مقدم", "عقيد", "عميد"], c: 1 },
        { type: "MCQ", q: "يجوز رد القاضي العسكري إذا كان له مصلحة في الدعوى:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "تبدأ السنة القضائية العسكرية في أول شهر:", a: ["يناير", "أكتوبر", "يوليو"], c: 1 },
        { type: "MCQ", q: "لا يجوز تفتيش مساكن العسكريين إلا بإذن من:", a: ["الشرطة العسكرية", "الادعاء العسكري", "قائد الوحدة"], c: 1 },
        { type: "MCQ", q: "يعتبر 'فراراً' ترك الخدمة في وقت الحرب إذا تغيب لمدة:", a: ["24 ساعة", "48 ساعة", "أي مدة بنية التخلص"], c: 2 },
        { type: "MCQ", q: "المرجع في تحديد الجرائم العسكرية هو:", a: ["قانون العمل", "قانون الجزاء العماني والقانون العسكري", "قانون التجارة"], c: 1 },
        { type: "MCQ", q: "تختص المحاكم العسكرية بالنظر في جرائم المتقاعدين إذا وقعت:", a: ["بعد التقاعد", "أثناء الخدمة وبسببها", "في أي وقت"], c: 1 },
        { type: "MCQ", q: "عضو الادعاء العسكري يملك صفة الضبطية القضائية بقرار من:", a: ["الوزير", "رئيس القضاء", "بموجب القانون"], c: 2 },
        { type: "MCQ", q: "تصدر الأحكام العسكرية بالاتماع أو بالأغلبية:", a: ["الأغلبية المطلقة", "الإجماع دائماً", "الأغلبية البسيطة"], c: 0 },
        { type: "MCQ", q: "عقوبة إفشاء أسرار الدفاع هي الإعدام أو السجن المطلق:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "تنقضي الدعوى الجزائية في المخالفات العسكرية بمضي:", a: ["6 أشهر", "سنة واحدة", "3 سنوات"], c: 1 },
        { type: "MCQ", q: "لا يجوز تنفيذ الإعدام في أيام الأعياد الرسمية:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "يُحرم العسكري المطرود من كافة الأوسمة والميداليات:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "يُعين قضاة المحكمة العسكرية العليا بقرار من الوزير:", a: ["صح", "خطأ (بأمر سلطاني)", "خطأ (بمرسوم)"], c: 1 },
        { type: "MCQ", q: "يجوز للادعاء العسكري حفظ التحقيق مؤقتاً لعدم معرفة الفاعل:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "تعتبر 'الفتنة' جريمة إذا اشترك فيها شخصان فأكثر:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "يعاقب بالسجن مدة لا تزيد عن سنة كل من تمارض بقصد التملص:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "يختص القضاء العسكري بالجرائم التي تقع من أسرى الحرب:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "تسقط الجريمة العسكرية بالتقادم إذا غادر المتهم البلاد:", a: ["نعم", "لا ينقطع التقادم", "ينقطع التقادم"], c: 2 },
        { type: "MCQ", q: "رئيس القضاء العسكري هو عضو في مجلس القضاء الأعلى:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "يكون الطعن في أحكام المحاكم الابتدائية أمام:", a: ["المحكمة العليا", "محكمة الاستئناف العسكرية", "الوزير"], c: 1 },
        { type: "MCQ", q: "تعتبر جلسات المحاكم العسكرية علنية إلا إذا قررت السرية:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "يجوز للمحكمة العسكرية تعديل التهمة أثناء الجلسة:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "يُحاكم العسكري عن الجرائم التي تقع خارج السلطنة:", a: ["نعم وفق هذا القانون", "لا أبداً", "حسب رغبة الدولة الأخرى"], c: 0 },
        { type: "MCQ", q: "عقوبة الحرمان من الرتبة هي عقوبة:", a: ["أصلية", "تبعية", "انضباطية"], c: 1 },
        { type: "MCQ", q: "المرجع الأعلى للقوات المسلحة هو القائد الأعلى:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "تُرفع الدعوى العسكرية من قبل:", a: ["المجني عليه", "الادعاء العسكري", "قائد الوحدة"], c: 1 },
        { type: "MCQ", q: "يُحظر على القضاة العسكريين الاشتغال بالتجارة:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "مدة انقضاء الدعوى في الجنايات العسكرية هي:", a: ["5 سنوات", "10 سنوات", "15 سنة"], c: 1 },
        { type: "MCQ", q: "يُقصد بكلمة 'الوزير' في القانون وزير المكتب السلطاني:", a: ["صح", "خطأ (نائب رئيس الوزراء لشؤون الدفاع)", "خطأ (وزير الدفاع)"], c: 2 },
        { type: "MCQ", q: "لا يجوز القبض على الضباط إلا بأمر من الادعاء العسكري:", a: ["صح", "خطأ (إلا في التلبس)", "خطأ (دائماً يجوز)"], c: 1 },
        { type: "MCQ", q: "يعاقب بالسجن مدة لا تقل عن 3 سنوات كل من أهان العلم العماني:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "يُعد 'آهلاً' للخدمة العسكرية كل من أتم السن القانوني:", a: ["صح", "خطأ"], c: 0 },
        { type: "MCQ", q: "أحكام المحكمة العسكرية العليا غير قابلة للطعن:", a: ["صح (باتة ونهائية)", "خطأ"], c: 0 },

        // --- 15 سؤال مقالي ---
        { type: "ESSAY", q: "ما هي شروط تعيين القضاة العسكريين؟", ans: "1. عماني الجنسية. 2. شهادة في القانون. 3. لا تقل الرتبة عن المحدد قانوناً. 4. حسن السمعة." },
        { type: "ESSAY", q: "عدّد الفئات الخاضعة للقانون وفق المادة 14.", ans: "العسكريون، الطلبة، المتقاعدون (عن جرائم الخدمة)، الاحتياط، المتطوعون، الأسرى، القوات الصديقة (وفق الاتفاقات)." },
        { type: "ESSAY", q: "ما هي حالات التلبس بالجريمة؟", ans: "مشاهدتها حال ارتكابها، أو عقبها ببرهة يسيرة، أو تتبع الجاني بالصياح، أو وجود آثار تدل على الجريمة." },
        { type: "ESSAY", q: "ما هي عقوبات الجنايات التبعية؟", ans: "الطرد من الخدمة، الحرمان من الرتبة، الحرمان من الأوسمة والميداليات." },
        { type: "ESSAY", q: "ما هو تعريف 'العدو' في القانون؟", ans: "القوات المحاربة للدولة، العصابات المسلحة، وأي جهة في حالة حرب مع عمان." },
        { type: "ESSAY", q: "اذكر اختصاصات الادعاء العسكري الأساسية.", ans: "إقامة الدعوى، التحقيق، الإشراف على مراكز التوقيف، تنفيذ الأحكام." },
        { type: "ESSAY", q: "متى تسقط الدعوى الجزائية العسكرية بالتقادم؟", ans: "الجنايات (10 سنوات)، الجنح (3 سنوات)، المخالفات (سنة واحدة)." },
        { type: "ESSAY", q: "ما هي سلطات المحكمة العسكرية العليا؟", ans: "الفصل في الطعون بالنقض، مراجعة الأحكام، تعيين المحكمة المختصة." },
        { type: "ESSAY", q: "متى يُعتبر العسكري 'فاراً' من الخدمة؟", ans: "إذا ترك الخدمة بنية التخلص منها نهائياً، أو غاب لمدة تزيد عن 48 ساعة في وقت الحرب." },
        { type: "ESSAY", q: "ما هي إجراءات التفتيش القانونية للمساكن؟", ans: "يجب صدور إذن من الادعاء العسكري، وبحضور المتهم أو شاهدين، وفي الأوقات المحددة قانوناً." },
        { type: "ESSAY", q: "اذكر ثلاث جرائم لا تسقط بالتقادم.", ans: "التجسس، التمرد، والفتنة (الجرائم الماسة بأمن الدولة)." },
        { type: "ESSAY", q: "كيف يتم رد القضاة العسكريين؟", ans: "بطلب يقدم قبل نظر الدعوى، بوجود أسباب قانونية مثل القرابة أو المصلحة المباشرة." },
        { type: "ESSAY", q: "ما هي شروط صحة انعقاد المحكمة العسكرية؟", ans: "حضور كامل الهيئة، حضور كاتب الجلسة، علانية الجلسة (ما لم يتقرر سرّيتها)." },
        { type: "ESSAY", q: "ما هي أثر عقوبة 'الطرد' على المزايا العسكرية؟", ans: "فقدان الرتبة، الحرمان من المعاش، الحرمان من الحقوق المالية السابقة، وعدم جواز العمل في القوات المسلحة." },
        { type: "ESSAY", q: "اذكر الفرق بين الحبس الاحتياطي والقبض.", ans: "القبض هو إجراء وقتي للتحفظ، أما الحبس الاحتياطي فهو سلب للحرية بقرار قضائي لاستكمال التحقيق." }
    ];

var userAns = [];
var submitted = false;
var letters = ['أ','ب','ج','د','هـ'];

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function startExam(){
  userAns = new Array(questions.length).fill(null);
  submitted = false;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('exam-body').style.display='block';
  document.getElementById('submit-bar').style.display='flex';
  document.getElementById('sub-total').textContent = questions.length;
  buildQuestions();
  window.scrollTo(0,0);
}

function buildQuestions(){
  var mcqHtml='', essayHtml='', mcqN=0, essayN=0;
  questions.forEach(function(q,i){
    var isMCQ = q.type==='MCQ';
    if(isMCQ){
      mcqN++;
      var opts = shuffle(q.a.map(function(t,j){return {t:t,j:j};}));
      questions[i]._opts = opts;
      var optsHtml = opts.map(function(o,k){
        return '<button class="opt" onclick="pick('+i+','+o.j+')" data-orig="'+o.j+'" id="opt-'+i+'-'+o.j+'">'+
          '<div class="opt-circle">'+letters[k]+'</div>'+o.t+'</button>';
      }).join('');
      mcqHtml += '<div class="q-card" id="qc-'+i+'">'+
        '<div class="q-num">سؤال '+mcqN+'</div>'+
        '<div class="q-text">'+q.q+'</div>'+
        '<div class="opts">'+optsHtml+'</div></div>';
    } else {
      essayN++;
      essayHtml += '<div class="q-card" id="qc-'+i+'">'+
        '<div class="q-num">سؤال '+essayN+'</div>'+
        '<div class="q-text">'+q.q+'</div>'+
        '<textarea class="essay-ta" id="ea-'+i+'" placeholder="اكتب إجابتك هنا..." oninput="markE('+i+')"></textarea>'+
        '<div class="model-ans" id="ma-'+i+'"><strong>الإجابة النموذجية:</strong><br>'+(q.ans||'')+'</div></div>';
    }
  });
  var html='';
  if(mcqHtml) html+='<div class="section-title">أولاً: الأسئلة الاختيارية ('+mcqN+' سؤالاً)</div>'+mcqHtml;
  if(essayHtml) html+='<div class="section-title">ثانياً: الأسئلة المقالية ('+essayN+' سؤالاً)</div>'+essayHtml;
  document.getElementById('questions-wrap').innerHTML=html;
}

function pick(qi,origIdx){
  if(submitted) return;
  document.querySelectorAll('#qc-'+qi+' .opt').forEach(function(o){o.classList.remove('selected');});
  document.getElementById('opt-'+qi+'-'+origIdx).classList.add('selected');
  userAns[qi]=origIdx;
  document.getElementById('qc-'+qi).classList.add('answered');
  updateP();
}

function markE(qi){
  if(submitted) return;
  var v=document.getElementById('ea-'+qi).value.trim();
  userAns[qi]=v||null;
  document.getElementById('qc-'+qi).classList.toggle('answered',v.length>0);
  updateP();
}

function updateP(){
  var done=userAns.filter(function(a){return a!==null;}).length;
  document.getElementById('prog-fill').style.width=(done/questions.length*100)+'%';
  document.getElementById('sub-done').textContent=done;
}

function submitExam(){
  if(submitted) return;
  submitted=true;
  var ok=0,total=0,reviewHtml='';
  questions.forEach(function(q,i){
    if(q.type==='MCQ'){
      total++;
      document.querySelectorAll('#qc-'+i+' .opt').forEach(function(o){
        o.disabled=true;
        var orig=parseInt(o.dataset.orig);
        if(orig===q.c) o.classList.add('correct');
        else if(o.classList.contains('selected')) o.classList.add('wrong');
      });
      if(userAns[i]===q.c){
        ok++;
        reviewHtml+='<div class="rv-item rv-ok"><div class="rv-q">✅ '+q.q+'</div></div>';
      } else {
        reviewHtml+='<div class="rv-item rv-no"><div class="rv-q">❌ '+q.q+'</div><div class="rv-note" style="color:var(--red)">الإجابة الصحيحة: '+q.a[q.c]+'</div></div>';
      }
    } else {
      document.getElementById('ea-'+i).disabled=true;
      document.getElementById('ma-'+i).classList.add('show');
    }
  });
  var pct=total>0?Math.round(ok/total*100):0;
  var grade=pct>=90?'🌟 ممتاز':pct>=80?'🏅 جيد جداً':pct>=70?'✨ جيد':pct>=60?'📚 مقبول':'💪 يحتاج مراجعة';
  document.getElementById('submit-bar').style.display='none';
  document.getElementById('result-wrap').style.display='block';
  document.getElementById('res-score').textContent=ok;
  document.getElementById('res-total').textContent='من '+total+' سؤالاً اختيارياً';
  document.getElementById('res-grade').textContent=grade;
  document.getElementById('rg-right').textContent=ok;
  document.getElementById('rg-wrong').textContent=total-ok;
  document.getElementById('rg-pct').textContent=pct+'%';
  document.getElementById('review-list').innerHTML=reviewHtml;
  document.getElementById('result-wrap').scrollIntoView({behavior:'smooth'});
}
</script>
