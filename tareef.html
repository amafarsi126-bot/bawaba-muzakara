<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار التعريفات — بوابة المذاكرة</title>
<meta name="theme-color" content="#0d1117">
<style>
:root{
  --gold:#c9a84c;--gold2:#e8c96a;
  --dark:#0d1117;--dark2:#161b22;--dark3:#1c2333;
  --card:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;--blue:#58a6ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Tahoma','Arial',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;direction:rtl;font-size:16px;padding-bottom:80px;}

/* TOP BAR */
.topbar{background:var(--dark3);border-bottom:2px solid var(--gold);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.back-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:7px 14px;border-radius:10px;text-decoration:none;font-size:.86rem;font-weight:700;}
.topbar-title{color:var(--gold);font-size:.95rem;font-weight:700;flex:1;}

/* PROGRESS */
.prog-wrap{height:4px;background:rgba(255,255,255,.08);}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .4s;width:0%;}

/* STATS BAR */
.stats-bar{display:flex;justify-content:center;gap:12px;padding:12px 18px;flex-wrap:wrap;}
.sbar{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 16px;font-size:.82rem;color:var(--muted);}
.sbar span{color:var(--gold);font-weight:700;}

/* START SCREEN */
.start-wrap{max-width:600px;margin:40px auto;padding:0 16px;}
.start-card{background:var(--card);border:1.5px solid rgba(201,168,76,.3);border-radius:20px;padding:36px 24px;text-align:center;}
.start-ico{font-size:3rem;margin-bottom:16px;}
.start-title{font-size:1.4rem;font-weight:900;color:var(--gold);margin-bottom:8px;}
.start-sub{font-size:.88rem;color:var(--muted);margin-bottom:28px;line-height:1.8;}
.start-stats{display:flex;justify-content:center;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.sstat{background:var(--dark3);border:1px solid var(--border);border-radius:14px;padding:12px 20px;text-align:center;}
.sstat-num{font-size:1.6rem;font-weight:900;color:var(--gold);}
.sstat-lbl{font-size:.72rem;color:var(--muted);margin-top:3px;}
.start-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;border-radius:40px;padding:14px 46px;font-family:inherit;font-size:1.05rem;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.35);transition:all .3s;}
.start-btn:hover{transform:scale(1.03);}

/* QUESTIONS */
.body{max-width:860px;margin:0 auto;padding:20px 16px;}
.section-title{background:linear-gradient(135deg,var(--dark3),var(--dark2));border:1px solid rgba(201,168,76,.2);border-right:3px solid var(--gold);border-radius:10px;padding:12px 16px;font-size:.95rem;font-weight:700;color:var(--gold);margin:24px 0 16px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 18px;margin-bottom:12px;transition:border-color .2s;}
.q-card.answered{border-color:rgba(201,168,76,.35);}
.q-num{font-size:.78rem;color:var(--muted);margin-bottom:8px;}
.q-text{font-size:.98rem;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.8;}

/* MCQ OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:center;gap:12px;padding:11px 15px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s;font-size:.9rem;color:var(--text);background:transparent;text-align:right;font-family:inherit;width:100%;}
.opt:hover{background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.3);}
.opt.selected{background:rgba(201,168,76,.12);border-color:var(--gold);color:var(--gold);}
.opt.correct{background:rgba(63,185,80,.12);border-color:var(--green);color:var(--green);}
.opt.wrong{background:rgba(248,81,73,.1);border-color:var(--red);color:var(--red);}
.opt-circle{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;transition:all .2s;}
.opt.selected .opt-circle{border-color:var(--gold);color:var(--gold);}
.opt.correct .opt-circle{border-color:var(--green);color:var(--green);}
.opt.wrong .opt-circle{border-color:var(--red);color:var(--red);}
.opt[disabled]{cursor:default;pointer-events:none;}

/* ESSAY */
.essay-ta{width:100%;min-height:100px;background:var(--dark3);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:12px 14px;font-family:inherit;font-size:.9rem;resize:vertical;direction:rtl;line-height:1.8;margin-top:8px;}
.essay-ta:focus{outline:none;border-color:var(--gold);}
.essay-ta::placeholder{color:var(--muted);}
.model-ans{display:none;margin-top:12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-right:3px solid var(--gold);border-radius:10px;padding:12px 14px;font-size:.86rem;color:var(--gold2);line-height:1.8;}
.model-ans.show{display:block;}

/* SUBMIT BAR */
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(13,17,23,.97);border-top:2px solid rgba(201,168,76,.3);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;backdrop-filter:blur(12px);z-index:200;}
.submit-info{font-size:.84rem;color:var(--muted);}
.submit-info strong{color:var(--gold);}
.submit-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;border-radius:12px;padding:12px 28px;font-size:.95rem;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,.4);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* RESULT */
.result-wrap{max-width:700px;margin:28px auto;padding:0 16px;display:none;}
.result-card{background:var(--card);border:1.5px solid var(--gold);border-radius:18px;padding:28px 20px;text-align:center;margin-bottom:20px;}
.result-score{font-size:4rem;font-weight:900;color:var(--gold);line-height:1;}
.result-total{font-size:1rem;color:var(--muted);margin-top:4px;}
.result-grade{font-size:1.4rem;font-weight:700;margin:12px 0;}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.rg-item{background:var(--dark3);border-radius:10px;padding:12px 8px;text-align:center;}
.rg-num{font-size:1.5rem;font-weight:900;}
.rg-lbl{font-size:.72rem;color:var(--muted);margin-top:3px;}
.retry-btn{background:linear-gradient(135deg,var(--gold),#a07830);color:var(--dark);border:none;border-radius:30px;padding:12px 32px;font-family:inherit;font-size:.95rem;font-weight:800;cursor:pointer;margin-top:8px;}

/* REVIEW */
.review-title{font-size:.9rem;font-weight:700;color:var(--gold);margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:10px;}
.rv-item{background:var(--dark3);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:.86rem;line-height:1.8;}
.rv-ok{border-right:3px solid var(--green);}
.rv-no{border-right:3px solid var(--red);}
.rv-q{color:var(--text);margin-bottom:4px;font-weight:600;}
.rv-note{font-size:.8rem;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.q-card{animation:fadeIn .3s ease;}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:500px){.result-grid{grid-template-columns:repeat(3,1fr)}.start-stats{gap:10px}}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← الرئيسية</a>
  <span class="topbar-title">📖 اختبار التعريفات</span>
</div>
<div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>

<!-- START -->
<div class="start-wrap" id="start-screen">
  <div class="start-card">
    <div class="start-ico">📖</div>
    <div class="start-title">اختبار التعريفات</div>
    <div class="start-sub">تعاريف قانونية مهمة وأسئلة مقالية</div>
    <div class="start-stats" id="start-stats"></div>
    <button class="start-btn" onclick="startExam()">ابدأ الاختبار ✦</button>
  </div>
</div>

<!-- EXAM -->
<div class="stats-bar" id="stats-bar" style="display:none">
  <div class="sbar">أجبت: <span id="sb-done">0</span> / <span id="sb-total">0</span></div>
  <div class="sbar">✅ <span id="sb-right">0</span></div>
  <div class="sbar">❌ <span id="sb-wrong">0</span></div>
</div>
<div class="body" id="exam-body" style="display:none">
  <div id="questions-wrap"></div>
</div>

<!-- RESULT -->
<div class="result-wrap" id="result-wrap">
  <div class="result-card">
    <div class="result-score" id="res-score">0</div>
    <div class="result-total" id="res-total"></div>
    <div class="result-grade" id="res-grade"></div>
    <div class="result-grid">
      <div class="rg-item"><div class="rg-num" id="rg-right" style="color:var(--green)">0</div><div class="rg-lbl">✅ صحيح</div></div>
      <div class="rg-item"><div class="rg-num" id="rg-wrong" style="color:var(--red)">0</div><div class="rg-lbl">❌ خطأ</div></div>
      <div class="rg-item"><div class="rg-num" id="rg-pct" style="color:var(--gold)">0%</div><div class="rg-lbl">🏆 النسبة</div></div>
    </div>
    <button class="retry-btn" onclick="location.reload()">🔄 إعادة الاختبار</button>
  </div>
  <div class="result-card" id="review-wrap">
    <div class="review-title">📋 مراجعة الإجابات</div>
    <div id="review-list"></div>
  </div>
</div>

<!-- SUBMIT BAR -->
<div class="submit-bar" id="submit-bar" style="display:none">
  <div class="submit-info">أجبت: <strong id="sub-done">0</strong> من <strong id="sub-total">0</strong></div>
  <button class="submit-btn" id="submit-btn" onclick="submitExam()">تسليم الاختبار ✓</button>
</div>

<script>
var ALL_Q = (function(){
  var raw = [
  // ══ التعاريف ══
  {t:"تعريف", q:"ما تعريف الجريمة؟",
   c:"كل فعل أو امتناع عن فعل يعاقب عليه القانون",
   o:["كل فعل أو امتناع عن فعل يعاقب عليه القانون","إخطار يقدمه شخص للجهات المختصة","مخالفة لأوامر الرؤساء","البحث عن الجاني وتقديمه للمحاكمة"],
   e:"الجريمة = فعل أو امتناع + يعاقب عليه القانون."},
  {t:"تعريف", q:"ما تعريف البلاغ؟",
   c:"إخطار يقدمه شخص إلى الجهات المختصة للإبلاغ عن جريمة أو حادث أو واقعة عرضية",
   o:["تقدم من المجني عليه ضد الجاني","إخطار يقدمه شخص إلى الجهات المختصة للإبلاغ عن جريمة أو حادث أو واقعة عرضية","مواجهة المدعى عليه بأدلة معينة","إجراء احتياطي وقتي لتأكيد التهمة"],
   e:"البلاغ يقدمه أي شخص، أما الشكوى فمن المجني عليه فقط."},
  {t:"تعريف", q:"ما تعريف الشكوى؟",
   c:"تقدم من المجني عليه أو وكيله الشرعي ضد الجاني",
   o:["إخطار يقدمه أي شخص عن جريمة","تقدم من المجني عليه أو وكيله الشرعي ضد الجاني","أمر من جهة قضائية لتوقيف شخص","إجراء للبحث عن الجاني"],
   e:"الشكوى خاصة بالمجني عليه أو وكيله الشرعي."},
  {t:"تعريف", q:"ما تعريف الحبس الاحتياطي؟",
   c:"إجراء احتياطي وقتي يوضع بموجبه المتهم في مكان معين بأمر من جهة قضائية مختصة للمدة المقررة قانوناً للتأكد من ثبوت التهمة",
   o:["عقوبة نهائية تصدر بحق المتهم","إجراء احتياطي وقتي يوضع بموجبه المتهم في مكان معين بأمر من جهة قضائية مختصة للمدة المقررة قانوناً للتأكد من ثبوت التهمة","تحديد إقامة المنتسب بحراسة في مكان يحدده القائد","إيقاف الولاية الوظيفية مؤقتاً"],
   e:"الحبس الاحتياطي مؤقت وبأمر قضائي للتحقق من التهمة."},
  {t:"تعريف", q:"ما تعريف الانضباط؟",
   c:"التحكم الذاتي الذي يمارسه الإنسان على نفسه لتكييف سلوكه وفق قواعد مقررة اقتضتها طبيعة العمل",
   o:["العقوبة المنصوص عليها في قانون الشرطة","التحكم الذاتي الذي يمارسه الإنسان على نفسه لتكييف سلوكه وفق قواعد مقررة اقتضتها طبيعة العمل","مجموعة من القواعد القانونية التي تحدد الجرائم","إجراء من إجراءات التفتيش الإداري"],
   e:"الانضباط = تحكم ذاتي + تكييف السلوك + طبيعة العمل."},
  {t:"تعريف", q:"ما تعريف مسرح الجريمة؟",
   c:"المكان أو مجموعة من الأمكنة التي مارس فيها الجاني نشاطه الإجرامي وما قد يحتوي على أدلة وآثار",
   o:["مكان احتجاز المتهم بأمر قضائي","مكان تنفيذ حكم السجن","المكان أو مجموعة من الأمكنة التي مارس فيها الجاني نشاطه الإجرامي وما قد يحتوي على أدلة وآثار","مقر عمل رجل الشرطة"],
   e:"مسرح الجريمة = موقع النشاط الإجرامي + الأدلة والآثار."},
  {t:"تعريف", q:"ما تعريف الإيقاف عن العمل؟",
   c:"إسقاط الولاية الوظيفية لرجل الشرطة مؤقتاً",
   o:["إنهاء خدمة رجل الشرطة نهائياً","إسقاط الولاية الوظيفية لرجل الشرطة مؤقتاً","تحديد إقامة المنتسب بحراسة","الحبس في مكان معين بأمر قضائي"],
   e:"الإيقاف عن العمل مؤقت وليس إنهاءً للخدمة."},
  {t:"تعريف", q:"ما تعريف التحفظ العسكري؟",
   c:"تحديد إقامة منتسب الشرطة بحراسة أو بدونها في مكان يحدده القائد المعني",
   o:["إيقاف الولاية الوظيفية مؤقتاً","الحبس الاحتياطي بأمر قضائي","تحديد إقامة منتسب الشرطة بحراسة أو بدونها في مكان يحدده القائد المعني","الفصل من الخدمة بمرسوم سلطاني"],
   e:"التحفظ العسكري يحدده القائد المعني وقد يكون بحراسة أو بدونها."},
  {t:"تعريف", q:"ما تعريف التفتيش القضائي؟",
   c:"إجراء من إجراءات التفتيش قد تسفر عنه نتائج أو أدلة تدين المتهم",
   o:["إجراء إداري لا يلزم فيه أمر تفتيش","إجراء من إجراءات التفتيش قد تسفر عنه نتائج أو أدلة تدين المتهم","البحث بجسم المتهم للحصول على أدلة مادية","مشاهدة مكان الجريمة وتوصيفه"],
   e:"التفتيش القضائي يهدف للحصول على أدلة تدين المتهم."},
  {t:"تعريف", q:"ما تعريف الدفاع الشرعي؟",
   c:"استعمال القوة اللازمة والضرورية لدفع خطر حال وغير مشروع يهدد بجريمة ضد النفس والمال",
   o:["استعمال القوة في جميع الأحوال","إجراء يتخذه رجل الشرطة لتأمين الممتلكات","استعمال القوة اللازمة والضرورية لدفع خطر حال وغير مشروع يهدد بجريمة ضد النفس والمال","مقاومة أوامر الرؤساء عند الإكراه"],
   e:"الدفاع الشرعي: قوة ضرورية + خطر حال + غير مشروع."},
  {t:"تعريف", q:"ما تعريف الرشوة؟",
   c:"اتجار الموظف بأعمال وظيفته بطلبه أو قبوله مقابل القيام بعمل أو الامتناع عنه أو تأخير إجرائه",
   o:["سرقة الموظف للمال الموكول إليه","الاستيلاء على المال العام من قبل الموظف","اتجار الموظف بأعمال وظيفته بطلبه أو قبوله مقابل القيام بعمل أو الامتناع عنه أو تأخير إجرائه","أخذ مال الغير المنقول بصورة غير شرعية"],
   e:"الرشوة = اتجار بالوظيفة + طلب أو قبول + مقابل عمل أو امتناع."},
  {t:"تعريف", q:"ما تعريف الاختلاس؟",
   c:"سرقة الموظف للمال الموكول إليه",
   o:["أخذ مال الغير بصورة غير شرعية","اتجار الموظف بأعمال وظيفته","سرقة الموظف للمال الموكول إليه","الاستيلاء على المال العام بالقوة"],
   e:"الاختلاس خاص بالموظف والمال المؤتمن عليه."},
  {t:"تعريف", q:"ما تعريف الدعوى العمومية؟",
   c:"مجموعة من الإجراءات التي يقوم بها الادعاء العام للتحقق من وقوع جريمة ونسبتها إلى فاعلها وتقديمه للقضاء",
   o:["مجموعة من الإجراءات التي يقوم بها الادعاء العام للتحقق من وقوع جريمة ونسبتها إلى فاعلها وتقديمه للقضاء","هيئة مستقلة تمثل المجتمع في القضايا","الإجراءات التي تتخذها سلطات الضبط عند وقوع الجريمة","مجموعة القواعد التي تحدد الجرائم والعقوبات"],
   e:"الدعوى العمومية = إجراءات الادعاء العام + إثبات الجريمة + تقديم المتهم للقضاء."},
  {t:"تعريف", q:"ما تعريف الضبط القضائي؟",
   c:"مجموعة من الإجراءات التي تتخذها سلطات الضبط القضائي عند وقوع الجريمة بهدف البحث عن مرتكبيها والقبض عليهم وتقديمهم للمحاكمة ثم تنفيذ العقوبة",
   o:["هيئة مستقلة تمثل المجتمع في الدعاوى","مجموعة من الإجراءات التي تتخذها سلطات الضبط القضائي عند وقوع الجريمة بهدف البحث عن مرتكبيها والقبض عليهم وتقديمهم للمحاكمة ثم تنفيذ العقوبة","إجراء احتياطي وقتي بأمر قضائي","مشاهدة مكان الجريمة وتوصيفه"],
   e:"الضبط القضائي: بحث + قبض + تقديم للمحاكمة + تنفيذ العقوبة."},
  {t:"تعريف", q:"ما تعريف الحادث المروري؟",

  {t:"مقالي", q:"أي من التالي هو أحد الحالات التي لا تصنف ضمن الحوادث المرورية البسيطة؟",
   c:"إذا كان أحد أطراف الحادث لا يحمل رخصة قيادة",
   o:["إذا كان الحادث في الليل","إذا كان أحد أطراف الحادث لا يحمل رخصة قيادة","إذا كانت المركبة قديمة","إذا كان السائق من خارج المنطقة"],
   e:"الحوادث غير البسيطة: سكر أو مخدر، بلا رخصة، وفيات أو إصابات، مركبة غير مؤمنة، أضرار بممتلكات عامة."},
  {t:"مقالي", q:"ما هي صور التعبير عن الوالء الوظيفي؟",
   c:"طاعة أوامر الرؤساء - الإخلاص - الغيرة عن الجهاز - الوفاء - التفاني - التضحية - السرية في العمل",
   o:["الحضور في الوقت المحدد فقط","الإنجاز السريع للمهام","طاعة أوامر الرؤساء - الإخلاص - الغيرة عن الجهاز - الوفاء - التفاني - التضحية - السرية في العمل","التنافس مع الزملاء لإثبات الكفاءة"],
   e:"صور الوالء الوظيفي سبعة: طاعة + إخلاص + غيرة + وفاء + تفانٍ + تضحية + سرية."},
  {t:"مقالي", q:"ما هي أنواع العقوبات الأصلية؟",
   c:"الإرهابية - التأديبية - التكديرية",
   o:["الإرهابية - التأديبية - التكديرية","الجسيمة - البسيطة - الجسيمة جداً","الجنائية - الانضباطية - الإدارية","الإعدام - السجن - الغرامة"],
   e:"أنواع العقوبات الأصلية ثلاثة: إرهابية + تأديبية + تكديرية."}
];;
  return raw.map(function(q) {
    if(q.o) {
      // MCQ - find index of correct answer
      var cidx = q.o.indexOf(q.c);
      if(cidx === -1) cidx = 0;
      return {type:'MCQ', q:q.q, o:q.o, c:cidx, e:q.e, t:q.t};
    } else {
      // Essay/definition
      return {type:'essay', q:q.q, ans:q.c, t:q.t};
    }
  });
})();
window.ALL_Q = ALL_Q;


var questions = [];
var userAns = [];
var submitted = false;
var letters = ['أ','ب','ج','د','هـ'];

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function startExam(){
  var QB = window.ALL_Q || window.ALL || [];
  questions = shuffle(QB);
  userAns = new Array(questions.length).fill(null);
  submitted = false;

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('exam-body').style.display = 'block';
  document.getElementById('submit-bar').style.display = 'flex';
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('sb-total').textContent = questions.length;
  document.getElementById('sub-total').textContent = questions.length;

  buildQuestions();
  updateProgress();
  window.scrollTo(0,0);
}

function buildQuestions(){
  var mcqCount = 0, essayCount = 0;
  var mcqHtml = '', essayHtml = '';

  questions.forEach(function(q, i){
    var isMCQ = q.type === 'MCQ' || q.o;
    var num = isMCQ ? ++mcqCount : ++essayCount;

    if(isMCQ){
      var opts = q.o || q.a;
      // Shuffle options
      var idxs = opts.map(function(_,j){return j;});
      idxs = shuffle(idxs);
      questions[i]._map = idxs;

      var optsHtml = idxs.map(function(origIdx, j){
        return '<button class="opt" onclick="pick('+i+','+origIdx+')" data-orig="'+origIdx+'" id="opt-'+i+'-'+origIdx+'">'+
          '<div class="opt-circle">'+letters[j]+'</div>'+
          (opts[origIdx])+'</button>';
      }).join('');

      mcqHtml += '<div class="q-card" id="qc-'+i+'">'+
        '<div class="q-num">سؤال '+num+'</div>'+
        '<div class="q-text">'+q.q+'</div>'+
        '<div class="opts">'+optsHtml+'</div>'+
        '</div>';
    } else {
      essayHtml += '<div class="q-card" id="qc-'+i+'">'+
        '<div class="q-num">سؤال '+num+'</div>'+
        '<div class="q-text">'+q.q+'</div>'+
        '<textarea class="essay-ta" id="ea-'+i+'" placeholder="اكتب إجابتك هنا..." '+
          'oninput="markEssay('+i+')"></textarea>'+
        '<div class="model-ans" id="ma-'+i+'"><strong>الإجابة النموذجية:</strong><br>'+(q.ans||q.c||'')+'</div>'+
        '</div>';
    }
  });

  var mcqTotal = mcqCount, essayTotal = essayCount;
  var html = '';
  if(mcqHtml) html += '<div class="section-title">أولاً: الأسئلة الاختيارية ('+mcqTotal+' سؤالاً)</div>'+mcqHtml;
  if(essayHtml) html += '<div class="section-title">ثانياً: الأسئلة المقالية ('+essayTotal+' سؤالاً)</div>'+essayHtml;
  document.getElementById('questions-wrap').innerHTML = html;
}

function pick(qi, origIdx){
  if(submitted) return;
  document.querySelectorAll('#qc-'+qi+' .opt').forEach(function(o){o.classList.remove('selected');});
  document.getElementById('opt-'+qi+'-'+origIdx).classList.add('selected');
  userAns[qi] = origIdx;
  document.getElementById('qc-'+qi).classList.add('answered');
  updateProgress();
}

function markEssay(qi){
  if(submitted) return;
  var v = document.getElementById('ea-'+qi).value.trim();
  userAns[qi] = v || null;
  document.getElementById('qc-'+qi).classList.toggle('answered', v.length > 0);
  updateProgress();
}

function updateProgress(){
  var done = userAns.filter(function(a){return a !== null;}).length;
  var pct = questions.length > 0 ? (done/questions.length*100) : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('sb-done').textContent = done;
  document.getElementById('sub-done').textContent = done;
}

function submitExam(){
  if(submitted) return;
  submitted = true;

  var mcqOk = 0, mcqTotal = 0;
  var reviewHtml = '';

  questions.forEach(function(q, i){
    var isMCQ = q.type === 'MCQ' || q.o;
    if(isMCQ){
      mcqTotal++;
      var correct = q.c !== undefined ? q.c : q.a;
      var opts = q.o || q.a;
      var ua = userAns[i];

      // Show correct/wrong
      document.querySelectorAll('#qc-'+i+' .opt').forEach(function(o){
        o.disabled = true;
        var orig = parseInt(o.dataset.orig);
        if(orig === correct) o.classList.add('correct');
        else if(o.classList.contains('selected')) o.classList.add('wrong');
      });

      if(ua === correct){
        mcqOk++;
        reviewHtml += '<div class="rv-item rv-ok"><div class="rv-q">✅ '+q.q+'</div><div class="rv-note" style="color:var(--green)">إجابة صحيحة</div></div>';
      } else {
        reviewHtml += '<div class="rv-item rv-no"><div class="rv-q">❌ '+q.q+'</div><div class="rv-note" style="color:var(--red)">الإجابة الصحيحة: '+(opts[correct])+'</div></div>';
      }
    } else {
      // Show model answer for essays
      document.getElementById('ea-'+i).disabled = true;
      document.getElementById('ma-'+i).classList.add('show');
    }
  });

  var pct = mcqTotal > 0 ? Math.round(mcqOk/mcqTotal*100) : 0;
  var grade = pct>=90?'🌟 ممتاز':pct>=80?'🏅 جيد جداً':pct>=70?'✨ جيد':pct>=60?'📚 مقبول':'💪 يحتاج مراجعة';

  document.getElementById('submit-bar').style.display = 'none';
  document.getElementById('result-wrap').style.display = 'block';
  document.getElementById('res-score').textContent = mcqOk;
  document.getElementById('res-total').textContent = 'من ' + mcqTotal + ' سؤالاً اختيارياً';
  document.getElementById('res-grade').textContent = grade;
  document.getElementById('rg-right').textContent = mcqOk;
  document.getElementById('rg-wrong').textContent = mcqTotal - mcqOk;
  document.getElementById('rg-pct').textContent = pct+'%';
  document.getElementById('review-list').innerHTML = reviewHtml;
  document.getElementById('result-wrap').scrollIntoView({behavior:'smooth'});

  // Save result
  try{
    var user = localStorage.getItem('pwa_user');
    if(user && user !== '__admin__'){
      var key = 'results_tareef_' + user;
      var results = JSON.parse(localStorage.getItem(key)||'[]');
      results.push({score:pct, date:new Date().toLocaleDateString('ar-OM'), note:mcqOk+'/'+mcqTotal});
      if(results.length>50) results=results.slice(-50);
      localStorage.setItem(key, JSON.stringify(results));
    }
  }catch(e){}
}

// Init
(function(){
  var QB = window.ALL_Q || window.ALL || [];
  var mcq = QB.filter(function(q){return q.type==='MCQ'||q.o;}).length;
  var essay = QB.filter(function(q){return q.type!=='MCQ'&&!q.o;}).length;
  var html = '<div class="sstat"><div class="sstat-num">'+mcq+'</div><div class="sstat-lbl">سؤال اختياري</div></div>';
  if(essay) html += '<div class="sstat"><div class="sstat-num">'+essay+'</div><div class="sstat-lbl">سؤال مقالي</div></div>';
  document.getElementById('start-stats').innerHTML = html;
})();
</script>
