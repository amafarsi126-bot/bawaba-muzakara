<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم المتقدمة</title>
  <style>
    :root {
      --gold: #c9a84c;
      --dark: #0d1117;
      --dark2: #161b22;
      --dark3: #1c2333;
      --card: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --blue: #58a6ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
      background: var(--dark);
      color: var(--text);
      direction: rtl;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 1.5rem;
      color: var(--gold);
    }

    .header-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      background: rgba(201, 168, 76, 0.12);
      border: 1px solid rgba(201, 168, 76, 0.3);
      color: var(--gold);
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn:hover {
      background: rgba(201, 168, 76, 0.2);
    }

    .btn-red {
      background: rgba(248, 81, 73, 0.12);
      border-color: rgba(248, 81, 73, 0.3);
      color: var(--red);
    }

    .btn-red:hover {
      background: rgba(248, 81, 73, 0.2);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-num {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 10px;
      color: var(--gold);
    }

    .stat-lbl {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 12px 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .tab-content {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .tab-content.active {
      display: block;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .search-box input {
      flex: 1;
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-family: inherit;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
    }

    .users-table th {
      background: var(--dark3);
      color: var(--gold);
      padding: 12px;
      text-align: right;
      font-weight: 700;
      border-bottom: 2px solid var(--border);
    }

    .users-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    .users-table tr:hover {
      background: rgba(201, 168, 76, 0.05);
    }

    .user-num {
      font-weight: 700;
      color: var(--gold);
    }

    .user-meta {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .action-btns {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      padding: 6px 10px;
      font-size: 0.8rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-ban {
      background: rgba(248, 81, 73, 0.12);
      color: var(--red);
      border: 1px solid rgba(248, 81, 73, 0.3);
    }

    .btn-ban:hover {
      background: rgba(248, 81, 73, 0.2);
    }

    .btn-unban {
      background: rgba(63, 185, 80, 0.12);
      color: var(--green);
      border: 1px solid rgba(63, 185, 80, 0.3);
    }

    .btn-unban:hover {
      background: rgba(63, 185, 80, 0.2);
    }

    .no-data {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(201, 168, 76, 0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: var(--gold);
      font-weight: 700;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--dark3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-family: inherit;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--gold);
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: rgba(63, 185, 80, 0.12);
      border: 1px solid rgba(63, 185, 80, 0.3);
      color: var(--green);
    }

    .message.error {
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--red);
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 15px;
        text-align: center;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .users-table {
        font-size: 0.9rem;
      }

      .users-table th,
      .users-table td {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <div class="header">
      <h1>⚙️ لوحة التحكم المتقدمة</h1>
      <div class="header-actions">
        <button class="btn" onclick="refreshData()">🔄 تحديث</button>
        <button class="btn btn-red" onclick="goBack()">← رجوع</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-num" id="total-users">—</div>
        <div class="stat-lbl">إجمالي المستخدمين</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="active-users">—</div>
        <div class="stat-lbl">المستخدمون النشطون</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="banned-users">—</div>
        <div class="stat-lbl">المحظورون</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="avg-rating">—</div>
        <div class="stat-lbl">متوسط التقييم</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('users')">👥 المستخدمون</button>
      <button class="tab-btn" onclick="switchTab('banned')">🚫 المحظورون</button>
      <button class="tab-btn" onclick="switchTab('supervisor')">👤 معلومات المشرف</button>
    </div>

    <!-- TAB: USERS -->
    <div id="users" class="tab-content active">
      <div class="search-box">
        <input type="text" id="search-users" placeholder="🔍 ابحث برقم الهاتف..." oninput="filterUsers()">
        <button class="btn" onclick="refreshData()">🔄 تحديث</button>
      </div>
      <div id="users-list" class="loading">
        <span class="spinner"></span> جاري التحميل...
      </div>
    </div>

    <!-- TAB: BANNED -->
    <div id="banned" class="tab-content">
      <div class="search-box">
        <input type="text" id="search-banned" placeholder="🔍 ابحث برقم الهاتف..." oninput="filterBanned()">
        <button class="btn" onclick="refreshData()">🔄 تحديث</button>
      </div>
      <div id="banned-list" class="loading">
        <span class="spinner"></span> جاري التحميل...
      </div>
    </div>

    <!-- TAB: SUPERVISOR -->
    <div id="supervisor" class="tab-content">
      <div id="supervisor-form">
        <div class="form-group">
          <label>اسم المشرف</label>
          <input type="text" id="supervisor-name" placeholder="أدخل اسم المشرف">
        </div>
        <div class="form-group">
          <label>رقم الهاتف</label>
          <input type="tel" id="supervisor-phone" placeholder="أدخل رقم الهاتف">
        </div>
        <div class="form-group">
          <label>واتس أب</label>
          <input type="tel" id="supervisor-whatsapp" placeholder="أدخل رقم واتس أب">
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="supervisor-email" placeholder="أدخل البريد الإلكتروني">
        </div>
        <div class="form-group">
          <label>ساعات العمل</label>
          <input type="text" id="supervisor-hours" placeholder="مثال: 8:00 - 16:00">
        </div>
        <div class="form-group">
          <label>ملاحظات إضافية</label>
          <textarea id="supervisor-notes" placeholder="أضف ملاحظات إضافية" rows="4"></textarea>
        </div>
        <div id="supervisor-message" class="message"></div>
        <button class="btn" onclick="saveSupervisor()">💾 حفظ المعلومات</button>
      </div>
    </div>
  </div>

  <script>
    const GAS = "https://script.google.com/macros/s/AKfycbxPDKWBpczRYXomMWIsB-QR37mB0aB3pDTbtl_mbrcBis5410cAiGeGEEgCKc_GQVik/exec";
    const ADMIN_PASS = "amal2025";

    let allUsers = [];
    let allBanned = [];

    // ── FETCH DATA ──
    async function refreshData() {
      try {
        // جلب المستخدمين
        const usersRes = await fetch(GAS + '?action=list&pass=' + ADMIN_PASS);
        const usersData = await usersRes.json();
        allUsers = usersData.data || [];

        // جلب المحظورين
        const bannedRes = await fetch(GAS + '?action=getBanned&pass=' + ADMIN_PASS);
        const bannedData = await bannedRes.json();
        allBanned = bannedData.data || [];

        // تحديث الإحصائيات
        updateStats();
        renderUsers();
        renderBanned();
        loadSupervisor();
      } catch (error) {
        console.error('❌ خطأ:', error);
        showMessage('users-list', 'خطأ في تحميل البيانات', 'error');
      }
    }

    // ── UPDATE STATS ──
    function updateStats() {
      const total = allUsers.length;
      const active = allUsers.filter(u => u.status !== 'محظور').length;
      const banned = allUsers.filter(u => u.status === 'محظور').length;
      const avgRating = allUsers.length > 0
        ? (allUsers.reduce((sum, u) => sum + (u.rating || 0), 0) / allUsers.length).toFixed(1)
        : '—';

      document.getElementById('total-users').textContent = total;
      document.getElementById('active-users').textContent = active;
      document.getElementById('banned-users').textContent = banned;
      document.getElementById('avg-rating').textContent = avgRating;
    }

    // ── RENDER USERS ──
    function renderUsers() {
      const list = document.getElementById('users-list');
      if (allUsers.length === 0) {
        list.innerHTML = '<div class="no-data">👥 لا يوجد مستخدمون بعد</div>';
        return;
      }

      let html = `
        <table class="users-table">
          <thead>
            <tr>
              <th>رقم الهاتف</th>
              <th>عدد الدخولات</th>
              <th>آخر دخول</th>
              <th>التقييم</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
      `;

      allUsers.forEach(user => {
        html += `
          <tr>
            <td><div class="user-num">${user.num}</div></td>
            <td><div class="user-meta">${user.visits || 0}</div></td>
            <td><div class="user-meta">${user.lastVisit || '—'}</div></td>
            <td><div class="user-meta">⭐ ${user.rating || 0}</div></td>
            <td>
              <div class="action-btns">
                <button class="action-btn btn-ban" onclick="banUser('${user.num}')">🚫 حظر</button>
              </div>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;
      list.innerHTML = html;
    }

    // ── RENDER BANNED ──
    function renderBanned() {
      const list = document.getElementById('banned-list');
      if (allBanned.length === 0) {
        list.innerHTML = '<div class="no-data">✅ لا يوجد محظورون</div>';
        return;
      }

      let html = `
        <table class="users-table">
          <thead>
            <tr>
              <th>رقم الهاتف</th>
              <th>السبب</th>
              <th>تاريخ الحظر</th>
              <th>النوع</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
      `;

      allBanned.forEach(ban => {
        html += `
          <tr>
            <td><div class="user-num">${ban.phone}</div></td>
            <td><div class="user-meta">${ban.reason || '—'}</div></td>
            <td><div class="user-meta">${ban.bannedAt || '—'}</div></td>
            <td><div class="user-meta">${ban.duration ? 'مؤقت' : 'دائم'}</div></td>
            <td>
              <div class="action-btns">
                <button class="action-btn btn-unban" onclick="unbanUser('${ban.phone}')">✅ رفع الحظر</button>
              </div>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;
      list.innerHTML = html;
    }

    // ── BAN USER ──
    async function banUser(phone) {
      const reason = prompt('أدخل سبب الحظر:');
      if (!reason) return;

      try {
        const res = await fetch(GAS, {
          method: 'POST',
          body: new URLSearchParams({
            action: 'ban',
            phone,
            reason,
            pass: ADMIN_PASS
          })
        });
        const data = await res.json();
        if (data.ok) {
          alert('✅ تم حظر الرقم');
          refreshData();
        } else {
          alert('❌ فشل الحظر');
        }
      } catch (error) {
        console.error('❌ خطأ:', error);
        alert('❌ خطأ في الحظر');
      }
    }

    // ── UNBAN USER ──
    async function unbanUser(phone) {
      if (!confirm('هل تريد رفع الحظر؟')) return;

      try {
        const res = await fetch(GAS, {
          method: 'POST',
          body: new URLSearchParams({
            action: 'unban',
            phone,
            pass: ADMIN_PASS
          })
        });
        const data = await res.json();
        if (data.ok) {
          alert('✅ تم رفع الحظر');
          refreshData();
        } else {
          alert('❌ فشل رفع الحظر');
        }
      } catch (error) {
        console.error('❌ خطأ:', error);
        alert('❌ خطأ في رفع الحظر');
      }
    }

    // ── LOAD SUPERVISOR ──
    function loadSupervisor() {
      const supervisorInfo = JSON.parse(localStorage.getItem('supervisorInfo') || '{}');
      document.getElementById('supervisor-name').value = supervisorInfo.name || '';
      document.getElementById('supervisor-phone').value = supervisorInfo.phone || '';
      document.getElementById('supervisor-whatsapp').value = supervisorInfo.whatsapp || '';
      document.getElementById('supervisor-email').value = supervisorInfo.email || '';
      document.getElementById('supervisor-hours').value = supervisorInfo.hours || '';
      document.getElementById('supervisor-notes').value = supervisorInfo.notes || '';
    }

    // ── SAVE SUPERVISOR ──
    function saveSupervisor() {
      const supervisorInfo = {
        name: document.getElementById('supervisor-name').value,
        phone: document.getElementById('supervisor-phone').value,
        whatsapp: document.getElementById('supervisor-whatsapp').value,
        email: document.getElementById('supervisor-email').value,
        hours: document.getElementById('supervisor-hours').value,
        notes: document.getElementById('supervisor-notes').value
      };

      localStorage.setItem('supervisorInfo', JSON.stringify(supervisorInfo));
      showMessage('supervisor-message', '✅ تم حفظ المعلومات', 'success');
      setTimeout(() => {
        document.getElementById('supervisor-message').classList.remove('show');
      }, 3000);
    }

    // ── FILTER USERS ──
    function filterUsers() {
      const search = document.getElementById('search-users').value.toLowerCase();
      const filtered = allUsers.filter(u => u.num.includes(search));
      
      let html = `
        <table class="users-table">
          <thead>
            <tr>
              <th>رقم الهاتف</th>
              <th>عدد الدخولات</th>
              <th>آخر دخول</th>
              <th>التقييم</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
      `;

      if (filtered.length === 0) {
        html += '<tr><td colspan="5" style="text-align:center;padding:20px;">🔍 لا توجد نتائج</td></tr>';
      } else {
        filtered.forEach(user => {
          html += `
            <tr>
              <td><div class="user-num">${user.num}</div></td>
              <td><div class="user-meta">${user.visits || 0}</div></td>
              <td><div class="user-meta">${user.lastVisit || '—'}</div></td>
              <td><div class="user-meta">⭐ ${user.rating || 0}</div></td>
              <td>
                <div class="action-btns">
                  <button class="action-btn btn-ban" onclick="banUser('${user.num}')">🚫 حظر</button>
                </div>
              </td>
            </tr>
          `;
        });
      }

      html += '</tbody></table>';
      document.getElementById('users-list').innerHTML = html;
    }

    // ── FILTER BANNED ──
    function filterBanned() {
      const search = document.getElementById('search-banned').value.toLowerCase();
      const filtered = allBanned.filter(b => b.phone.includes(search));
      
      let html = `
        <table class="users-table">
          <thead>
            <tr>
              <th>رقم الهاتف</th>
              <th>السبب</th>
              <th>تاريخ الحظر</th>
              <th>النوع</th>
              <th>الإجراءات</th>
            </tr>
          </thead>
          <tbody>
      `;

      if (filtered.length === 0) {
        html += '<tr><td colspan="5" style="text-align:center;padding:20px;">🔍 لا توجد نتائج</td></tr>';
      } else {
        filtered.forEach(ban => {
          html += `
            <tr>
              <td><div class="user-num">${ban.phone}</div></td>
              <td><div class="user-meta">${ban.reason || '—'}</div></td>
              <td><div class="user-meta">${ban.bannedAt || '—'}</div></td>
              <td><div class="user-meta">${ban.duration ? 'مؤقت' : 'دائم'}</div></td>
              <td>
                <div class="action-btns">
                  <button class="action-btn btn-unban" onclick="unbanUser('${ban.phone}')">✅ رفع الحظر</button>
                </div>
              </td>
            </tr>
          `;
        });
      }

      html += '</tbody></table>';
      document.getElementById('banned-list').innerHTML = html;
    }

    // ── SWITCH TAB ──
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });

      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // ── SHOW MESSAGE ──
    function showMessage(elementId, message, type) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = `message show ${type}`;
    }

    // ── GO BACK ──
    function goBack() {
      window.location.href = 'index.html';
    }

    // ── INIT ──
    window.addEventListener('load', refreshData);
  </script>
</body>
</html>
