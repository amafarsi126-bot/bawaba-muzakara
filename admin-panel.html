<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم — بوابة المذاكرة</title>
<meta name="theme-color" content="#0d1117">
<style>
:root{
  --gold:#c9a84c;--gold2:#e8c96a;
  --dark:#0d1117;--dark2:#161b22;--dark3:#1c2333;
  --card:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;--blue:#58a6ff;--orange:#e8892a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Tahoma','Arial',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;direction:rtl;}

/* HEADER */
.admin-header{background:var(--dark3);border-bottom:2px solid var(--gold);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.admin-title{font-size:1.3rem;font-weight:900;color:var(--gold);}
.admin-actions{display:flex;gap:10px;}
.btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:8px 16px;border-radius:10px;font-size:.86rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn:hover{background:rgba(201,168,76,.2);}
.btn.danger{background:rgba(248,81,73,.1);border-color:rgba(248,81,73,.3);color:var(--red);}
.btn.danger:hover{background:rgba(248,81,73,.2);}

/* CONTAINER */
.container{max-width:1200px;margin:0 auto;padding:20px;}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;transition:all .3s;}
.stat-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.stat-number{font-size:2.5rem;font-weight:900;margin-bottom:8px;}
.stat-label{font-size:.9rem;color:var(--muted);}
.stat-card.gold .stat-number{color:var(--gold);}
.stat-card.green .stat-number{color:var(--green);}
.stat-card.red .stat-number{color:var(--red);}
.stat-card.blue .stat-number{color:var(--blue);}

/* SECTIONS */
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px;}
.section-title{font-size:1.1rem;font-weight:800;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.section-title span{font-size:.85rem;color:var(--muted);font-weight:400;}

/* SEARCH & FILTER */
.search-box{display:flex;gap:10px;margin-bottom:16px;}
.search-input{flex:1;background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-family:inherit;font-size:.9rem;direction:rtl;}
.search-input:focus{outline:none;border-color:var(--gold);}
.search-input::placeholder{color:var(--muted);}

/* USER LIST */
.user-list{display:flex;flex-direction:column;gap:10px;}
.user-item{background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:space-between;transition:all .2s;}
.user-item:hover{border-color:var(--gold);}
.user-item.banned{background:rgba(248,81,73,.05);border-color:rgba(248,81,73,.3);}

.user-info{flex:1;}
.user-phone{font-size:.95rem;font-weight:700;font-family:monospace;color:var(--text);}
.user-meta{font-size:.8rem;color:var(--muted);margin-top:4px;}
.user-badge{display:inline-block;background:rgba(248,81,73,.15);color:var(--red);padding:2px 8px;border-radius:20px;font-size:.72rem;margin-top:4px;margin-right:8px;}
.user-badge.active{background:rgba(63,185,80,.15);color:var(--green);}

.user-actions{display:flex;gap:6px;}
.action-btn{padding:6px 12px;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s;}
.action-btn.ban{background:rgba(248,81,73,.1);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.action-btn.unban{background:rgba(63,185,80,.1);color:var(--green);border:1px solid rgba(63,185,80,.3);}
.action-btn.delete{background:rgba(139,148,158,.1);color:var(--muted);border:1px solid var(--border);}
.action-btn:hover{opacity:0.8;transform:translateY(-1px);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
.empty-state-icon{font-size:3rem;margin-bottom:12px;}

/* ADD USER FORM */
.add-form{display:flex;gap:10px;margin-bottom:16px;}
.form-input{flex:1;background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:10px;font-family:inherit;font-size:.9rem;direction:ltr;}
.form-input:focus{outline:none;border-color:var(--gold);}
.add-btn{background:linear-gradient(135deg,var(--green),#0d8659);color:var(--dark);border:none;padding:10px 20px;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.add-btn:hover{transform:translateY(-2px);}
.form-message{font-size:.8rem;margin-top:8px;padding:8px 12px;border-radius:8px;display:none;}
.form-message.success{background:rgba(63,185,80,.15);color:var(--green);display:block;}
.form-message.error{background:rgba(248,81,73,.15);color:var(--red);display:block;}

/* RATINGS */
.ratings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.rating-item{background:var(--dark3);border-radius:10px;padding:12px;text-align:center;}
.rating-stars{font-size:1.5rem;margin-bottom:6px;}
.rating-count{font-size:.9rem;color:var(--muted);}

/* RESPONSIVE */
@media(max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .user-actions{flex-direction:column;}
  .search-box{flex-direction:column;}
  .add-form{flex-direction:column;}
}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="admin-header">
  <div class="admin-title">🔐 لوحة التحكم</div>
  <div class="admin-actions">
    <button class="btn" onclick="loadDashboard()">🔄 تحديث</button>
    <button class="btn danger" onclick="logout()">خروج</button>
  </div>
</div>

<div class="container">
  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card gold">
      <div class="stat-number" id="total-users">0</div>
      <div class="stat-label">إجمالي المسجّلين</div>
    </div>
    <div class="stat-card green">
      <div class="stat-number" id="active-users">0</div>
      <div class="stat-label">نشطون اليوم</div>
    </div>
    <div class="stat-card red">
      <div class="stat-number" id="banned-users">0</div>
      <div class="stat-label">محظورون</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-number" id="avg-rating">0</div>
      <div class="stat-label">متوسط التقييم</div>
    </div>
  </div>

  <!-- ADD USER -->
  <div class="section">
    <div class="section-title">➕ إضافة مستخدم جديد</div>
    <div class="adm-body">
    <div style="background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:12px;padding:16px;margin-bottom:20px;display:flex;gap:12px;align-items:center;">
      <span style="font-size:1.5rem;">⚡</span>
      <div>
        <div style="font-weight:700;color:var(--gold);margin-bottom:4px;">لوحة تحكم متقدمة</div>
        <div style="font-size:.85rem;color:var(--muted);">إدارة متقدمة للمستخدمين والمشرف</div>
      </div>
      <a href="advanced-admin-panel.html" style="margin-right:auto;background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);color:var(--gold);padding:8px 16px;border-radius:8px;text-decoration:none;font-weight:700;font-size:.9rem;">الدخول →</a>
    </div>
      <input type="tel" class="form-input" id="new-phone" placeholder="أدخل رقم الهاتف (8 أرقام)" inputmode="numeric" maxlength="8">
      <button class="add-btn" onclick="addUser()">إضافة</button>
    </div>
    <div class="form-message" id="form-msg"></div>
  </div>

  <!-- USERS LIST -->
  <div class="section">
    <div class="section-title">
      <span>👥 المسجّلون (<span id="users-count">0</span>)</span>
      <button class="btn" onclick="toggleUserList()">🔍 عرض/إخفاء</button>
    </div>
    <div class="search-box">
      <input type="text" class="search-input" id="search-phone" placeholder="🔍 ابحث برقم الهاتف..." oninput="filterUsers()">
    </div>
    <div class="user-list" id="users-list">
      <div class="empty-state">
        <div class="empty-state-icon">👥</div>
        <div>جاري التحميل...</div>
      </div>
    </div>
  </div>

  <!-- RATINGS -->
  <div class="section">
    <div class="section-title">⭐ التقييمات</div>
    <div class="ratings-grid" id="ratings-grid">
      <div class="rating-item">
        <div class="rating-stars">⭐⭐⭐⭐⭐</div>
        <div class="rating-count">0 تقييم</div>
      </div>
      <div class="rating-item">
        <div class="rating-stars">⭐⭐⭐⭐</div>
        <div class="rating-count">0 تقييم</div>
      </div>
      <div class="rating-item">
        <div class="rating-stars">⭐⭐⭐</div>
        <div class="rating-count">0 تقييم</div>
      </div>
      <div class="rating-item">
        <div class="rating-stars">⭐⭐</div>
        <div class="rating-count">0 تقييم</div>
      </div>
    </div>
  </div>
</div>

<script src="message-system.js"></script>
<script>
var allUsers = [];

// ── LOAD DASHBOARD ──
function loadDashboard(){
  // محاكاة البيانات (يمكن ربطها بـ API حقيقي)
  allUsers = [
    {phone: '96898765432', visits: 12, lastVisit: 'اليوم', status: 'نشط', rating: 5},
    {phone: '96898765433', visits: 8, lastVisit: 'أمس', status: 'نشط', rating: 4},
    {phone: '96898765434', visits: 3, lastVisit: 'قبل 3 أيام', status: 'محظور', rating: 2},
    {phone: '96898765435', visits: 15, lastVisit: 'اليوم', status: 'نشط', rating: 5},
    {phone: '96898765436', visits: 5, lastVisit: 'أمس', status: 'نشط', rating: 3},
  ];
  
  updateStats();
  renderUsers();
}

// ── UPDATE STATS ──
function updateStats(){
  const total = allUsers.length;
  const active = allUsers.filter(u => u.status === 'نشط').length;
  const banned = allUsers.filter(u => u.status === 'محظور').length;
  const avgRating = (allUsers.reduce((sum, u) => sum + (u.rating || 0), 0) / total || 0).toFixed(1);
  
  document.getElementById('total-users').textContent = total;
  document.getElementById('active-users').textContent = active;
  document.getElementById('banned-users').textContent = banned;
  document.getElementById('avg-rating').textContent = avgRating;
  document.getElementById('users-count').textContent = total;
}

// ── RENDER USERS ──
function renderUsers(){
  const list = document.getElementById('users-list');
  const search = (document.getElementById('search-phone').value || '').trim();
  
  let filtered = allUsers;
  if(search){
    filtered = allUsers.filter(u => u.phone.includes(search));
  }
  
  if(filtered.length === 0){
    list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div>لا توجد نتائج</div></div>';
    return;
  }
  
  list.innerHTML = filtered.map(u => `
    <div class="user-item ${u.status === 'محظور' ? 'banned' : ''}">
      <div class="user-info">
        <div class="user-phone">${u.phone}</div>
        <div class="user-meta">
          دخل: ${u.visits} مرة | آخر دخول: ${u.lastVisit}
          <div class="user-badge ${u.status === 'نشط' ? 'active' : ''}">${u.status}</div>
          <div style="margin-top:4px;font-size:.8rem;color:var(--gold);">⭐ ${u.rating || 0}/5</div>
        </div>
      </div>
      <div class="user-actions">
        ${u.status === 'محظور' 
          ? `<button class="action-btn unban" onclick="toggleBan('${u.phone}', false)">رفع الحظر</button>`
          : `<button class="action-btn ban" onclick="toggleBan('${u.phone}', true)">حظر</button>`
        }
        <button class="action-btn delete" onclick="deleteUser('${u.phone}')">حذف</button>
      </div>
    </div>
  `).join('');
}

// ── FILTER USERS ──
function filterUsers(){
  renderUsers();
}

// ── TOGGLE BAN ──
function toggleBan(phone, ban){
  if(ban){
    const reason = prompt('سبب الحظر:', 'انتهاك القوانين');
    if(!reason) return;
    
    const duration = prompt('مدة الحظر (بالساعات) - اترك فارغا للحظر الدائم:', '');
    const durationNum = duration ? parseInt(duration) : null;
    
    if(!confirm('هل تريد حظر ' + phone + '؟')) return;
    messageSystem.banUser(phone, reason, durationNum);
  } else {
    if(!confirm('هل تريد رفع الحظر عن ' + phone + '؟')) return;
    messageSystem.unbanUser(phone);
  }
  
  const user = allUsers.find(u => u.phone === phone);
  if(user){
    user.status = ban ? 'محظور' : 'نشط';
    updateStats();
    renderUsers();
  }
}

// ── DELETE USER ──
function deleteUser(phone){
  if(!confirm('حذف ' + phone + '؟ لا يمكن التراجع.')) return;
  
  allUsers = allUsers.filter(u => u.phone !== phone);
  updateStats();
  renderUsers();
}

// ── ADD USER ──
function addUser(){
  const input = document.getElementById('new-phone');
  const msg = document.getElementById('form-msg');
  const phone = input.value.trim().replace(/\D/g, '');
  
  msg.className = 'form-message';
  
  if(!/^\d{8}$/.test(phone)){
    msg.className = 'form-message error';
    msg.textContent = '❌ أدخل 8 أرقام صحيحة';
    return;
  }
  
  const fullPhone = '968' + phone;
  
  if(allUsers.find(u => u.phone === fullPhone)){
    msg.className = 'form-message error';
    msg.textContent = '⚠️ الرقم موجود مسبقاً';
    return;
  }
  
  allUsers.push({
    phone: fullPhone,
    visits: 0,
    lastVisit: 'الآن',
    status: 'نشط',
    rating: 0
  });
  
  input.value = '';
  msg.className = 'form-message success';
  msg.textContent = '✅ تمت إضافة ' + fullPhone;
  
  updateStats();
  renderUsers();
  
  setTimeout(() => { msg.textContent = ''; }, 3000);
}

// ── TOGGLE USER LIST ──
function toggleUserList(){
  const list = document.getElementById('users-list');
  list.style.display = list.style.display === 'none' ? 'flex' : 'none';
}

// ── LOGOUT ──
function logout(){
  localStorage.removeItem('pwa_user');
  window.location.href = 'index.html';
}

// Load on startup
window.addEventListener('load', loadDashboard);
</script>
<script src="navigation.js"></script>
</body>
</html>
